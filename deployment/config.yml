# Deployment Pipeline Configuration
# This file defines environment-specific configuration for the deployment pipeline
# Customers can modify this file to match their infrastructure

# Azure Configuration
azure:
  appConfigName: "appconfig-hartonomous"  # Customer's Azure App Configuration name
  resourceGroup: "rg-hartonomous"          # Customer's resource group
  keyVaultName: "kv-hartonomous"           # Customer's Key Vault name
  subscriptionId: ""                        # Leave empty to use default subscription
  tenantId: ""                              # Leave empty to use default tenant

# GitHub Configuration (if using GitHub Actions)
github:
  organization: ""                          # GitHub organization or username
  repository: ""                            # Repository name
  environments:
    development:
      approvers: []                         # List of GitHub usernames for approvals
    staging:
      approvers: []                         # List of GitHub usernames for approvals
    production:
      approvers: []                         # List of GitHub usernames for approvals

# Azure DevOps Configuration (if using Azure DevOps)
azureDevOps:
  organization: ""                          # Azure DevOps organization URL
  project: ""                               # Project name
  serviceConnection: "Azure-ServiceConnection"  # Service connection name
  environments:
    development:
      approvers: []                         # List of user emails for approvals
    staging:
      approvers: []                         # List of user emails for approvals
    production:
      approvers: []                         # List of user emails for approvals

# Environment Configuration
environments:
  development:
    name: "development"
    deployOnBranch: "develop"
    runner:
      # For Azure DevOps: pool name and agent demands
      # For GitHub Actions: runs-on labels
      type: "self-hosted"                   # "self-hosted" or "hosted"
      os: "windows"                         # "windows", "linux", or "macos"
      labels: ["HART-DESKTOP"]              # Additional runner labels
    
  staging:
    name: "staging"
    deployOnBranch: "develop"
    requiresApproval: true
    runner:
      type: "self-hosted"
      os: "linux"
      labels: ["hart-server"]
  
  production:
    name: "production"
    deployOnBranch: "main"
    requiresApproval: true
    runner:
      type: "self-hosted"
      os: "linux"
      labels: ["hart-server"]

# Application Configuration
application:
  name: "hartonomous-api"
  buildConfiguration: "Release"
  pythonVersion: "3.x"
  
  # Paths relative to repository root
  apiDirectory: "api"
  requirementsFile: "requirements.txt"
  
  # Health check configuration
  healthCheckPath: "/v1/health"
  healthCheckTimeout: 10
  healthCheckRetries: 3

# Deployment Strategy
deployment:
  strategy: "runOnce"                       # "runOnce", "rolling", or "canary"
  
  # Rollback configuration
  rollbackOnFailure: true
  rollbackTimeout: 300
  
  # Database migrations
  runMigrations: true
  migrationTool: "alembic"
  
  # Service management
  serviceRestartDelay: 2
  serviceStartupDelay: 5
