trigger:
  branches:
    include:
      - main
      - develop
  tags:
    include:
      - v*

parameters:
  - name: deploymentTarget
    displayName: 'Deployment Target'
    type: string
    default: 'Default'
    values:
      - 'Default'
      - 'None'
      - 'hart-server-linux'
      - 'hart-server-windows'
      - 'hart-desktop-linux'
      - 'hart-desktop-windows'
      - 'azure-linux'
      - 'azure-windows'
  - name: deploymentOS
    displayName: 'Target OS'
    type: string
    default: 'Linux'
    values:
      - 'Linux'
      - 'Windows'
  - name: deploymentEnvironment
    displayName: 'Environment'
    type: string
    default: 'Production'
    values:
      - 'Development'
      - 'Staging'
      - 'Production'

pool:
  name: 'Local Agent Pool'

variables:
  buildConfiguration: 'Release'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Variable group containing KeyVaultName, AppConfigName
  - group: 'Hartonomous-Infrastructure'
  # Default artifacts feed name
  - name: ArtifactsFeedName
    value: 'Hartonomous'
  # Default: Production/Staging -> HART-SERVER, Development -> HART-DESKTOP
  ${{ if eq(parameters.deploymentTarget, 'Default') }}:
    ${{ if eq(parameters.deploymentEnvironment, 'Development') }}:
      deployHost: 'hart-desktop'
    ${{ else }}:
      deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-server-linux') }}:
    deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-server-windows') }}:
    deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-desktop-linux') }}:
    deployHost: 'hart-desktop'
  ${{ if eq(parameters.deploymentTarget, 'hart-desktop-windows') }}:
    deployHost: 'hart-desktop'
  ${{ if eq(parameters.deploymentTarget, 'azure-linux') }}:
    deployHost: '$(AZURE_LINUX_HOST)'
  ${{ if eq(parameters.deploymentTarget, 'azure-windows') }}:
    deployHost: '$(AZURE_WINDOWS_HOST)'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build Solution (Server Projects)'
        steps:
          - task: PowerShell@2
            displayName: 'Display Environment Info'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================"
                Write-Host "Environment Information"
                Write-Host "========================================"
                Write-Host "Agent: $env:AGENT_NAME"
                Write-Host "Build Configuration: $(buildConfiguration)"
                Write-Host "Working Directory: $(Build.SourcesDirectory)"
                Write-Host ""
                Write-Host "PATH Environment Variable:"
                Write-Host $env:PATH
                Write-Host ""
                Write-Host ".NET SDK Version:"
                dotnet --version
                Write-Host ""
                Write-Host "CMake Version:"
                cmake --version
                Write-Host ""
                Write-Host "========================================"

          - task: CMake@1
            displayName: 'Configure Native Library (Windows)'
            condition: eq(variables['Agent.OS'], 'Windows_NT')
            inputs:
              cmakeArgs: '-S Hartonomous.Native -B Hartonomous.Native/build -DCMAKE_BUILD_TYPE=$(buildConfiguration)'

          - task: CMake@1
            displayName: 'Build Native Library (Windows)'
            condition: eq(variables['Agent.OS'], 'Windows_NT')
            inputs:
              cmakeArgs: '--build Hartonomous.Native/build --config $(buildConfiguration)'

          - task: CMake@1
            displayName: 'Configure Native Library (Linux)'
            condition: eq(variables['Agent.OS'], 'Linux')
            inputs:
              cmakeArgs: '-S Hartonomous.Native -B Hartonomous.Native/build -DCMAKE_BUILD_TYPE=$(buildConfiguration)'

          - task: CMake@1
            displayName: 'Build Native Library (Linux)'
            condition: eq(variables['Agent.OS'], 'Linux')
            inputs:
              cmakeArgs: '--build Hartonomous.Native/build --config $(buildConfiguration)'

          - task: PowerShell@2
            displayName: 'Copy Native Binaries to Package Location'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Copying native binaries for packaging..."
                $buildBinPath = "$(Build.SourcesDirectory)/Hartonomous.Native/build/bin"
                $packageBinPath = "$(Build.SourcesDirectory)/Hartonomous.Native/build/bin/$(buildConfiguration)"
                
                if (Test-Path $buildBinPath) {
                  New-Item -Path $packageBinPath -ItemType Directory -Force | Out-Null
                  
                  # Copy all native libraries
                  Get-ChildItem -Path $buildBinPath -Include "*.dll","*.so","*.dylib" -Recurse | ForEach-Object {
                    Write-Host "Copying $($_.Name) to $packageBinPath"
                    Copy-Item $_.FullName -Destination $packageBinPath -Force
                  }
                  
                  # Also copy to test binaries directory
                  Copy-Item -Path "$buildBinPath/*" -Destination "$(Build.BinariesDirectory)" -Recurse -Force -ErrorAction SilentlyContinue
                  
                  Write-Host "Native binaries copied successfully"
                  Get-ChildItem $packageBinPath
                } else {
                  Write-Warning "Build bin path not found: $buildBinPath"
                }

          - task: DotNetCoreCLI@2
            displayName: 'Restore All Server Projects'
            inputs:
              command: 'restore'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj
                Hartonomous.ServiceDefaults/Hartonomous.ServiceDefaults.csproj
                Hartonomous.API/Hartonomous.API.csproj
                Hartonomous.Worker/Hartonomous.Worker.csproj

          - task: DotNetCoreCLI@2
            displayName: 'Build Core'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Core/Hartonomous.Core.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Data'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Data/Hartonomous.Data.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Infrastructure'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build ServiceDefaults'
            inputs:
              command: 'build'
              projects: 'Hartonomous.ServiceDefaults/Hartonomous.ServiceDefaults.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build API'
            inputs:
              command: 'build'
              projects: 'Hartonomous.API/Hartonomous.API.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Worker'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Worker/Hartonomous.Worker.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
            continueOnError: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/*.cobertura.xml'
            condition: succeededOrFailed()

  - stage: Package
    displayName: 'Create NuGet Packages'
    dependsOn: Build
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/v')))
    jobs:
      - job: Pack
        displayName: 'Pack NuGet Packages'
        steps:
          - task: AzureKeyVault@2
            displayName: 'Get Secrets from Key Vault'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              KeyVaultName: '$(KeyVaultName)'
              SecretsFilter: 'NuGetFeedUrl,AzureDevOpsOrgUrl,AzureDevOpsProject'
              RunAsPreJob: false

          - task: PowerShell@2
            displayName: 'Configure NuGet Authentication via Managed Identity'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Configuring NuGet authentication using Azure managed identity..."
                
                # Install Azure Artifacts Credential Provider
                if (-not (Test-Path "$env:USERPROFILE\.nuget\plugins\netcore")) {
                  Write-Host "Installing Azure Artifacts Credential Provider..."
                  Invoke-Expression "& { $(Invoke-RestMethod https://aka.ms/install-artifacts-credprovider.ps1) }"
                }
                
                # Configure VSS_NUGET_EXTERNAL_FEED_ENDPOINTS for managed identity auth
                $feedUrl = "$(NuGetFeedUrl)"
                
                # Get managed identity token for Azure DevOps
                $token = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
                
                $feedEndpoint = @{
                  endpointCredentials = @(
                    @{
                      endpoint = $feedUrl
                      username = "VssSessionToken"
                      password = $token
                    }
                  )
                } | ConvertTo-Json -Compress
                
                [Environment]::SetEnvironmentVariable("VSS_NUGET_EXTERNAL_FEED_ENDPOINTS", $feedEndpoint)
                Write-Host "##vso[task.setvariable variable=VSS_NUGET_EXTERNAL_FEED_ENDPOINTS]$feedEndpoint"
                
                Write-Host "✓ NuGet authentication configured"

          - task: PowerShell@2
            displayName: 'Display Package Environment Info'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================"
                Write-Host "NuGet Package Build Information"
                Write-Host "========================================"
                Write-Host "Build Configuration: $(buildConfiguration)"
                Write-Host "Source Branch: $(Build.SourceBranch)"
                Write-Host "Build ID: $(Build.BuildId)"
                Write-Host "Artifact Staging Directory: $(Build.ArtifactStagingDirectory)"
                Write-Host "========================================"

          - task: CMake@1
            displayName: 'Configure Native Library (Package)'
            inputs:
              cmakeArgs: '-S Hartonomous.Native -B Hartonomous.Native/build -DCMAKE_BUILD_TYPE=$(buildConfiguration)'

          - task: CMake@1
            displayName: 'Build Native Library (Package)'
            inputs:
              cmakeArgs: '--build Hartonomous.Native/build --config $(buildConfiguration)'

          - task: PowerShell@2
            displayName: 'Prepare Native Binaries for NuGet'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Preparing native binaries for NuGet packaging..."
                $buildBinPath = "$(Build.SourcesDirectory)/Hartonomous.Native/build/bin"
                $packageBinPath = "$(Build.SourcesDirectory)/Hartonomous.Native/build/bin/$(buildConfiguration)"
                
                if (Test-Path $buildBinPath) {
                  New-Item -Path $packageBinPath -ItemType Directory -Force | Out-Null
                  
                  # Copy all native libraries with proper structure
                  Get-ChildItem -Path $buildBinPath -Include "*.dll","*.so","*.dylib" -Recurse | ForEach-Object {
                    Write-Host "Copying $($_.Name) to $packageBinPath"
                    Copy-Item $_.FullName -Destination $packageBinPath -Force
                  }
                  
                  Write-Host "Native binaries prepared for packaging:"
                  Get-ChildItem $packageBinPath | Format-Table Name, Length
                } else {
                  Write-Error "Build bin path not found: $buildBinPath"
                  exit 1
                }

          - task: DotNetCoreCLI@2
            displayName: 'Restore All Dependencies'
            inputs:
              command: 'restore'
              projects: |
                Hartonomous.Native/Hartonomous.Native.csproj
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj
              feedsToUse: 'config'
              nugetConfigPath: 'NuGet.config'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Native Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Native/Hartonomous.Native.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: false
              includesymbols: false
              includesource: false
              versioningScheme: 'off'

          - task: DotNetCoreCLI@2
            displayName: 'Build Core for Packaging'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Core/Hartonomous.Core.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Core Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Core/Hartonomous.Core.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: DotNetCoreCLI@2
            displayName: 'Build Data for Packaging'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Data/Hartonomous.Data.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Data Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Data/Hartonomous.Data.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: DotNetCoreCLI@2
            displayName: 'Build Infrastructure for Packaging'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Infrastructure Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: PowerShell@2
            displayName: 'List Generated Packages'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================"
                Write-Host "Generated NuGet Packages:"
                Write-Host "========================================"
                Get-ChildItem -Path "$(Build.ArtifactStagingDirectory)/packages" -Filter "*.nupkg" | ForEach-Object {
                  Write-Host "$($_.Name) - $([math]::Round($_.Length / 1KB, 2)) KB"
                }
                Write-Host "========================================"

          - task: NuGetCommand@2
            displayName: 'Push Packages to Azure Artifacts'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.ArtifactStagingDirectory)/packages/**/*.nupkg;!$(Build.ArtifactStagingDirectory)/packages/**/*.symbols.nupkg'
              nuGetFeedType: 'internal'
              publishVstsFeed: '$(AzureDevOpsProject)/$(ArtifactsFeedName)'
              allowPackageConflicts: false
            env:
              VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: $(VSS_NUGET_EXTERNAL_FEED_ENDPOINTS)

          - task: NuGetCommand@2
            displayName: 'Push Symbol Packages to Azure Artifacts'
            inputs:
              command: 'push'
              packagesToPush: '$(Build.ArtifactStagingDirectory)/packages/**/*.symbols.nupkg'
              nuGetFeedType: 'internal'
              publishVstsFeed: '$(AzureDevOpsProject)/$(ArtifactsFeedName)'
              allowPackageConflicts: false
            env:
              VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: $(VSS_NUGET_EXTERNAL_FEED_ENDPOINTS)
            continueOnError: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish NuGet Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/packages'
              ArtifactName: 'nuget-packages'

  - stage: Deploy
    displayName: 'Deploy Applications'
    dependsOn: Build
    condition: and(succeeded(), and(ne('${{ parameters.deploymentTarget }}', 'None'), or(eq('${{ parameters.deploymentTarget }}', 'Default'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))))
    jobs:
      - deployment: DeployLinux
        displayName: 'Deploy to Arc-enabled Linux Server'
        condition: eq('${{ parameters.deploymentOS }}', 'Linux')
        environment: '${{ parameters.deploymentEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - task: AzureCLI@2
                  displayName: 'Setup Infrastructure (systemd services)'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $setupScript = Get-Content "$(Build.SourcesDirectory)/deploy/setup-systemd-services.sh" -Raw
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "setup-systemd-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$setupScript ${{ parameters.deploymentEnvironment }}" `
                        --timeout-in-seconds 600
                
                - task: AzureCLI@2
                  displayName: 'Setup Infrastructure (nginx reverse proxy)'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $setupScript = Get-Content "$(Build.SourcesDirectory)/deploy/setup-nginx-config.sh" -Raw
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "setup-nginx-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$setupScript ${{ parameters.deploymentEnvironment }}" `
                        --timeout-in-seconds 600
                
                - task: AzureCLI@2
                  displayName: 'Sync SSL Certificates from Router'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $syncScript = Get-Content "$(Build.SourcesDirectory)/scripts/setup-sync-certificates.sh" -Raw
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "sync-certs-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$syncScript" `
                        --timeout-in-seconds 600
                
                - task: AzureCLI@2
                  displayName: 'Validate Infrastructure'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $validationScript = @"
                      #!/bin/bash
                      set -e
                      
                      echo "Validating infrastructure for ${{ parameters.deploymentEnvironment }}..."
                      
                      # Check systemd services exist
                      systemctl list-unit-files | grep hartonomous-api-${{ parameters.deploymentEnvironment }} || exit 1
                      systemctl list-unit-files | grep hartonomous-worker-${{ parameters.deploymentEnvironment }} || exit 1
                      systemctl list-unit-files | grep hartonomous-web-${{ parameters.deploymentEnvironment }} || exit 1
                      
                      # Check nginx configuration
                      nginx -t || exit 1
                      
                      # Check directories exist
                      test -d /srv/www/${{ parameters.deploymentEnvironment }} || exit 1
                      test -d /srv/www/${{ parameters.deploymentEnvironment }}/api || exit 1
                      test -d /srv/www/${{ parameters.deploymentEnvironment }}/worker || exit 1
                      test -d /srv/www/${{ parameters.deploymentEnvironment }}/web || exit 1
                      
                      echo "✓ Infrastructure validation passed"
                      "@
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "validate-infra-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$validationScript" `
                        --timeout-in-seconds 300
                
                - task: AzureCLI@2
                  displayName: 'Deploy via Azure Arc Run Command'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      # Get Azure AD token for Azure DevOps
                      $token = az account get-access-token --resource https://app.vssps.visualstudio.com/ --query accessToken -o tsv
                      
                      # Create deployment script that will run on Arc server
                      $script = @"
                      #!/bin/bash
                      set -e
                      
                      # Authenticate to Azure DevOps using Arc server's managed identity
                      export AZURE_DEVOPS_EXT_PAT=`$(az account get-access-token --resource https://app.vssps.visualstudio.com/ --query accessToken -o tsv)
                      
                      # Download artifacts from pipeline run
                      mkdir -p /tmp/hartonomous-deploy
                      cd /tmp/hartonomous-deploy
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name api \
                        --path ./api
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name worker \
                        --path ./worker
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name web \
                        --path ./web
                      
                      # Execute deployment
                      cp $(Build.SourcesDirectory)/deploy/deploy-app.sh .
                      chmod +x deploy-app.sh
                      sudo REMOTE_DEPLOY=false ./deploy-app.sh ${{ parameters.deploymentEnvironment }} all
                      
                      # Cleanup
                      cd /
                      rm -rf /tmp/hartonomous-deploy
                      "@
                      
                      # Execute via Run Command
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "deploy-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$script" `
                        --timeout-in-seconds 1800
      
      - deployment: DeployWindows
        displayName: 'Deploy to Arc-enabled Windows Server'
        condition: eq('${{ parameters.deploymentOS }}', 'Windows')
        environment: '${{ parameters.deploymentEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - task: AzureCLI@2
                  displayName: 'Setup Infrastructure (IIS)'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $setupScript = Get-Content "$(Build.SourcesDirectory)/deploy/Setup-IIS-Infrastructure.ps1" -Raw
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "setup-iis-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$setupScript -Environment ${{ parameters.deploymentEnvironment }}" `
                        --timeout-in-seconds 600
                
                - task: AzureCLI@2
                  displayName: 'Validate Infrastructure'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      $validationScript = @"
                      Import-Module WebAdministration
                      
                      Write-Host "Validating infrastructure for ${{ parameters.deploymentEnvironment }}..."
                      
                      # Check IIS app pools exist
                      if (-not (Test-Path "IIS:\AppPools\Hartonomous.API.${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "API app pool not found"
                          exit 1
                      }
                      if (-not (Test-Path "IIS:\AppPools\Hartonomous.Web.${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "Web app pool not found"
                          exit 1
                      }
                      
                      # Check IIS sites exist
                      if (-not (Test-Path "IIS:\Sites\Hartonomous.API.${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "API site not found"
                          exit 1
                      }
                      if (-not (Test-Path "IIS:\Sites\Hartonomous.Web.${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "Web site not found"
                          exit 1
                      }
                      
                      # Check directories exist
                      if (-not (Test-Path "C:\inetpub\wwwroot\hartonomous\${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "Deploy directory not found"
                          exit 1
                      }
                      if (-not (Test-Path "C:\Services\Hartonomous\${{ parameters.deploymentEnvironment }}")) {
                          Write-Error "Services directory not found"
                          exit 1
                      }
                      
                      Write-Host "✓ Infrastructure validation passed"
                      "@
                      
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "validate-infra-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$validationScript" `
                        --timeout-in-seconds 300
                
                - task: AzureCLI@2
                  displayName: 'Deploy via Azure Arc Run Command'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      # Create deployment script that will run on Arc server
                      $script = @"
                      # Authenticate to Azure DevOps using Arc server's managed identity
                      `$env:AZURE_DEVOPS_EXT_PAT = az account get-access-token --resource https://app.vssps.visualstudio.com/ --query accessToken -o tsv
                      
                      # Download artifacts from pipeline run
                      `$tempPath = "C:\Temp\hartonomous-deploy-$(Build.BuildId)"
                      New-Item -Path `$tempPath -ItemType Directory -Force | Out-Null
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name api \
                        --path "`$tempPath\api"
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name worker \
                        --path "`$tempPath\worker"
                      
                      az pipelines runs artifact download \
                        --organization '$(System.TeamFoundationCollectionUri)' \
                        --project '$(System.TeamProject)' \
                        --run-id $(Build.BuildId) \
                        --artifact-name web \
                        --path "`$tempPath\web"
                      
                      # Execute deployment
                      Invoke-WebRequest -Uri '$(Build.Repository.Uri)/deploy/Deploy-App.ps1?version=GC$(Build.SourceVersion)' -OutFile "`$tempPath\Deploy-App.ps1"
                      & "`$tempPath\Deploy-App.ps1" -Environment "${{ parameters.deploymentEnvironment }}" -Component all -ApiArtifact "`$tempPath\api" -WorkerArtifact "`$tempPath\worker" -WebArtifact "`$tempPath\web"
                      
                      # Cleanup
                      Remove-Item -Path `$tempPath -Recurse -Force
                      "@
                      
                      # Execute via Run Command
                      az connectedmachine run-command create `
                        --resource-group rg-hartonomous `
                        --machine-name "$(deployHost)" `
                        --name "deploy-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$script" `
                        --timeout-in-seconds 1800
      - job: PublishAPI
        displayName: 'Publish API'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.API/Hartonomous.API.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'
              zipAfterPublish: false

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/api'
              artifactName: 'api'

      - job: PublishWorker
        displayName: 'Publish Worker'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Worker'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.Worker/Hartonomous.Worker.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/worker'
              zipAfterPublish: false

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/worker'
              artifactName: 'worker'

      - job: PublishWeb
        displayName: 'Publish Blazor Web'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Web'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.App/Hartonomous.App.Web/Hartonomous.App.Web.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/web'
              zipAfterPublish: false

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/web'
              artifactName: 'web'
