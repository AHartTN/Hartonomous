trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - Hartonomous.Db/**
      - Hartonomous.Api/**
      - Hartonomous.Shared/**
      - Hartonomous.Maui/**
      - docker-compose*.yml
      - scripts/**
      - infrastructure/**

pr:
  branches:
    include:
      - main
      - develop

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'
  vmImageName: 'ubuntu-latest'
  containerRegistry: 'ghcr.io'
  containerNamespace: 'ahartn'
  arcResourceGroup: 'rg-hartonomous'
  arcCluster1: 'hart-server'
  arcCluster2: 'HART-DESKTOP'

stages:
  - stage: Infrastructure
    displayName: 'Setup Zero Trust Infrastructure'
    jobs:
      - job: ConfigureInfrastructure
        displayName: 'Configure RBAC and Key Vault'
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Setup Zero Trust (Idempotent)'
            inputs:
              azureSubscription: 'AzureArcConnection'
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: 'infrastructure/setup-zero-trust.sh'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
            continueOnError: false

          - task: PowerShell@2
            displayName: 'Verify Key Vault Secrets'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Verifying Key Vault configuration..."
                az keyvault secret list --vault-name kv-hartonomous --query "[].name" -o table

                $requiredSecrets = @(
                  "AzureAd--TenantId",
                  "AzureAd--ClientId",
                  "postgres-connection-localhost",
                  "postgres-connection-dev",
                  "postgres-connection-staging",
                  "postgres-connection-production"
                )

                $existingSecrets = az keyvault secret list --vault-name kv-hartonomous --query "[].name" -o tsv

                foreach ($secret in $requiredSecrets) {
                  if ($existingSecrets -notcontains $secret) {
                    Write-Host "ERROR: Missing required secret: $secret" -ForegroundColor Red
                    exit 1
                  }
                }

                Write-Host "✓ All required secrets present" -ForegroundColor Green

  - stage: Build
    displayName: 'Build and Test'
    dependsOn: Infrastructure
    jobs:
      - job: Build
        displayName: 'Build Solution'
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK'
            inputs:
              packageType: 'sdk'
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build Solution'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage" --logger trx'
              publishTestResults: true

          - task: AzureCLI@2
            displayName: 'Build and Push Docker Image to GHCR'
            inputs:
              azureSubscription: 'AzureArcConnection'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                IMAGE_NAME="$(containerRegistry)/$(containerNamespace)/hartonomous-api"
                IMAGE_TAG="$(Build.BuildId)"

                echo "Building Docker image: $IMAGE_NAME:$IMAGE_TAG"
                docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest -f Hartonomous.Api/Dockerfile .

                echo "Pushing to GHCR..."
                GITHUB_USER=$(az keyvault secret show --vault-name kv-hartonomous --name github-username --query value -o tsv)
                az keyvault secret show --vault-name kv-hartonomous --name github-token --query value -o tsv | docker login ghcr.io -u "$GITHUB_USER" --password-stdin
                docker push $IMAGE_NAME:$IMAGE_TAG
                docker push $IMAGE_NAME:latest

                echo "✓ Images pushed successfully"

  - stage: DeployLocalhost
    displayName: 'Deploy to Localhost (Arc Cluster 1)'
    dependsOn:
      - Infrastructure
      - Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployLocalhost
        displayName: 'Deploy Localhost Environment'
        pool:
          vmImage: $(vmImageName)
        environment: 'localhost'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy to Arc Machine'
                  inputs:
                    azureSubscription: 'AzureArcConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az config set extension.use_dynamic_install=yes_without_prompt

                      # Arc machine fetches GitHub credentials from Key Vault
                      az connectedmachine run-command create \
                        --name deploy-localhost-$(Build.BuildId) \
                        --resource-group $(arcResourceGroup) \
                        --machine-name $(arcCluster1) \
                        --script "
                          GITHUB_USER=\$(az keyvault secret show --vault-name kv-hartonomous --name github-username --query value -o tsv)
                          az keyvault secret show --vault-name kv-hartonomous --name github-token --query value -o tsv | docker login ghcr.io -u \"\$GITHUB_USER\" --password-stdin
                          docker pull ghcr.io/$(containerNamespace)/hartonomous-api:$(Build.BuildId)
                          docker-compose -f /opt/hartonomous/docker-compose.yml up -d
                        "

                - task: PowerShell@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $env:ASPNETCORE_ENVIRONMENT = "localhost"
                      dotnet ef database update --project Hartonomous.Db/Hartonomous.Db.csproj --startup-project Hartonomous.Api/Hartonomous.Api.csproj

  - stage: DeployDev
    displayName: 'Deploy to Dev (Arc Cluster 1)'
    dependsOn:
      - Infrastructure
      - Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployDev
        displayName: 'Deploy Dev Environment'
        pool:
          vmImage: $(vmImageName)
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy to Arc Machine'
                  inputs:
                    azureSubscription: 'AzureArcConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az connectedmachine run-command create \
                        --name deploy-dev-$(Build.BuildId) \
                        --resource-group $(arcResourceGroup) \
                        --machine-name $(arcCluster1) \
                        --script "
                          GITHUB_USER=\$(az keyvault secret show --vault-name kv-hartonomous --name github-username --query value -o tsv)
                          az keyvault secret show --vault-name kv-hartonomous --name github-token --query value -o tsv | docker login ghcr.io -u \"\$GITHUB_USER\" --password-stdin
                          docker pull ghcr.io/$(containerNamespace)/hartonomous-api:$(Build.BuildId)
                          docker-compose -f /opt/hartonomous/docker-compose.yml up -d
                        "

                - task: PowerShell@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $env:ASPNETCORE_ENVIRONMENT = "dev"
                      dotnet ef database update --project Hartonomous.Db/Hartonomous.Db.csproj --startup-project Hartonomous.Api/Hartonomous.Api.csproj

  - stage: DeployStaging
    displayName: 'Deploy to Staging (Arc Cluster 2)'
    dependsOn: DeployDev
    condition: succeeded()
    jobs:
      - deployment: DeployStaging
        displayName: 'Deploy Staging Environment'
        pool:
          vmImage: $(vmImageName)
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy to Arc Machine'
                  inputs:
                    azureSubscription: 'AzureArcConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az connectedmachine run-command create \
                        --name deploy-staging-$(Build.BuildId) \
                        --resource-group $(arcResourceGroup) \
                        --machine-name $(arcCluster2) \
                        --script "
                          GITHUB_USER=\$(az keyvault secret show --vault-name kv-hartonomous --name github-username --query value -o tsv)
                          az keyvault secret show --vault-name kv-hartonomous --name github-token --query value -o tsv | docker login ghcr.io -u \"\$GITHUB_USER\" --password-stdin
                          docker pull ghcr.io/$(containerNamespace)/hartonomous-api:$(Build.BuildId)
                          docker-compose -f /opt/hartonomous/docker-compose.yml up -d
                        "

                - task: PowerShell@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $env:ASPNETCORE_ENVIRONMENT = "staging"
                      dotnet ef database update --project Hartonomous.Db/Hartonomous.Db.csproj --startup-project Hartonomous.Api/Hartonomous.Api.csproj

  - stage: DeployProduction
    displayName: 'Deploy to Production (Arc Cluster 2)'
    dependsOn: DeployStaging
    condition: succeeded()
    jobs:
      - deployment: DeployProduction
        displayName: 'Deploy Production Environment'
        pool:
          vmImage: $(vmImageName)
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy to Arc Machine'
                  inputs:
                    azureSubscription: 'AzureArcConnection'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az connectedmachine run-command create \
                        --name deploy-production-$(Build.BuildId) \
                        --resource-group $(arcResourceGroup) \
                        --machine-name $(arcCluster2) \
                        --script "
                          GITHUB_USER=\$(az keyvault secret show --vault-name kv-hartonomous --name github-username --query value -o tsv)
                          az keyvault secret show --vault-name kv-hartonomous --name github-token --query value -o tsv | docker login ghcr.io -u \"\$GITHUB_USER\" --password-stdin
                          docker pull ghcr.io/$(containerNamespace)/hartonomous-api:$(Build.BuildId)
                          docker-compose -f /opt/hartonomous/docker-compose.yml up -d
                        "

                - task: PowerShell@2
                  displayName: 'Run Database Migrations'
                  inputs:
                    targetType: 'inline'
                    script: |
                      $env:ASPNETCORE_ENVIRONMENT = "production"
                      dotnet ef database update --project Hartonomous.Db/Hartonomous.Db.csproj --startup-project Hartonomous.Api/Hartonomous.Api.csproj

                - task: PowerShell@2
                  displayName: 'Run Health Checks'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "Production deployment complete"
                      Write-Host "Image: ghcr.io/$(containerNamespace)/hartonomous-api:$(Build.BuildId)"
