trigger:
  branches:
    include:
      - main
      - develop
  tags:
    include:
      - v*

parameters:
  - name: deploymentTarget
    displayName: 'Deployment Target'
    type: string
    default: 'Default'
    values:
      - 'Default'
      - 'None'
      - 'hart-server-linux'
      - 'hart-server-windows'
      - 'hart-desktop-linux'
      - 'hart-desktop-windows'
      - 'azure-linux'
      - 'azure-windows'
  - name: deploymentOS
    displayName: 'Target OS'
    type: string
    default: 'Linux'
    values:
      - 'Linux'
      - 'Windows'
  - name: deploymentEnvironment
    displayName: 'Environment'
    type: string
    default: 'Production'
    values:
      - 'Development'
      - 'Staging'
      - 'Production'

pool:
  name: 'Local Agent Pool'

variables:
  buildConfiguration: 'Release'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  # Azure Arc deployment configuration
  # Required pipeline variables (set in Azure DevOps):
  # - DEPLOY_STORAGE_ACCOUNT: Storage account name for deployment artifacts
  # - DEPLOY_RESOURCE_GROUP: Resource group containing Arc-enabled servers
  # Default: Production/Staging -> HART-SERVER, Development -> HART-DESKTOP
  ${{ if eq(parameters.deploymentTarget, 'Default') }}:
    ${{ if eq(parameters.deploymentEnvironment, 'Development') }}:
      deployHost: 'hart-desktop'
    ${{ else }}:
      deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-server-linux') }}:
    deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-server-windows') }}:
    deployHost: 'hart-server'
  ${{ if eq(parameters.deploymentTarget, 'hart-desktop-linux') }}:
    deployHost: 'hart-desktop'
  ${{ if eq(parameters.deploymentTarget, 'hart-desktop-windows') }}:
    deployHost: 'hart-desktop'
  ${{ if eq(parameters.deploymentTarget, 'azure-linux') }}:
    deployHost: '$(AZURE_LINUX_HOST)'
  ${{ if eq(parameters.deploymentTarget, 'azure-windows') }}:
    deployHost: '$(AZURE_WINDOWS_HOST)'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: Build
        displayName: 'Build Solution (Server Projects)'
        steps:
          - task: PowerShell@2
            displayName: 'Display Environment Info'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "========================================"
                Write-Host "Environment Information"
                Write-Host "========================================"
                Write-Host "Agent: $env:AGENT_NAME"
                Write-Host "Build Configuration: $(buildConfiguration)"
                Write-Host "Working Directory: $(Build.SourcesDirectory)"
                Write-Host ""
                Write-Host "PATH Environment Variable:"
                Write-Host $env:PATH
                Write-Host ""
                Write-Host ".NET SDK Version:"
                dotnet --version
                Write-Host ""
                Write-Host ".NET SDKs Installed:"
                dotnet --list-sdks
                Write-Host ""
                Write-Host ".NET Runtimes Installed:"
                dotnet --list-runtimes
                Write-Host ""
                Write-Host "========================================"

          - task: DotNetCoreCLI@2
            displayName: 'Restore All Server Projects'
            inputs:
              command: 'restore'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj
                Hartonomous.ServiceDefaults/Hartonomous.ServiceDefaults.csproj
                Hartonomous.API/Hartonomous.API.csproj
                Hartonomous.Worker/Hartonomous.Worker.csproj

          - task: DotNetCoreCLI@2
            displayName: 'Build Core'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Core/Hartonomous.Core.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Data'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Data/Hartonomous.Data.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Infrastructure'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build ServiceDefaults'
            inputs:
              command: 'build'
              projects: 'Hartonomous.ServiceDefaults/Hartonomous.ServiceDefaults.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build API'
            inputs:
              command: 'build'
              projects: 'Hartonomous.API/Hartonomous.API.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Build Worker'
            inputs:
              command: 'build'
              projects: 'Hartonomous.Worker/Hartonomous.Worker.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore -p:GeneratePackageOnBuild=false'

          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'
            continueOnError: true

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/*.cobertura.xml'
            condition: succeededOrFailed()

  - stage: Package
    displayName: 'Create NuGet Packages'
    dependsOn: Build
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/v')))
    jobs:
      - job: Pack
        displayName: 'Pack NuGet Packages'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Restore All Dependencies'
            inputs:
              command: 'restore'
              projects: 'Hartonomous.slnx'

          - task: DotNetCoreCLI@2
            displayName: 'Build Solution'
            inputs:
              command: 'build'
              projects: 'Hartonomous.slnx'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Core Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Core/Hartonomous.Core.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Data Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Data/Hartonomous.Data.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: DotNetCoreCLI@2
            displayName: 'Pack Infrastructure Library'
            inputs:
              command: 'pack'
              packagesToPack: 'Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj'
              configuration: $(buildConfiguration)
              packDirectory: '$(Build.ArtifactStagingDirectory)/packages'
              nobuild: true
              includesymbols: true
              includesource: true
              versioningScheme: 'off'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish NuGet Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/packages'
              ArtifactName: 'nuget-packages'

  - stage: Deploy
    displayName: 'Deploy Applications'
    dependsOn: Build
    condition: and(succeeded(), and(ne('${{ parameters.deploymentTarget }}', 'None'), or(eq('${{ parameters.deploymentTarget }}', 'Default'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))))
    jobs:
      - deployment: DeployLinux
        displayName: 'Deploy to Arc-enabled Linux Server'
        condition: eq('${{ parameters.deploymentOS }}', 'Linux')
        environment: '${{ parameters.deploymentEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - download: current
                  artifact: api-drop
                
                - download: current
                  artifact: worker-drop
                
                - download: current
                  artifact: web-drop
                
                - task: AzureCLI@2
                  displayName: 'Upload Artifacts to Storage'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Create temporary storage container for deployment artifacts
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "deployments-$(Build.BuildId)"
                      
                      # Upload artifacts
                      az storage container create --name $containerName --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/api-drop" --destination-path "api" --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/worker-drop" --destination-path "worker" --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/web-drop" --destination-path "web" --account-name $storageAccount --auth-mode login
                      az storage blob upload --container-name $containerName --file "$(Build.SourcesDirectory)/deploy/deploy-app.sh" --name "deploy-app.sh" --account-name $storageAccount --auth-mode login
                      
                      # Generate SAS token (1 hour expiry)
                      $expiry = (Get-Date).AddHours(1).ToString("yyyy-MM-ddTHH:mm:ssZ")
                      $sasToken = az storage container generate-sas --name $containerName --account-name $storageAccount --permissions r --expiry $expiry --auth-mode login --as-user --output tsv
                      Write-Host "##vso[task.setvariable variable=DEPLOY_CONTAINER]$containerName"
                      Write-Host "##vso[task.setvariable variable=DEPLOY_SAS_TOKEN]$sasToken"
                
                - task: AzureCLI@2
                  displayName: 'Deploy via Azure Arc Run Command'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Execute deployment script via Arc Run Command
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "$(DEPLOY_CONTAINER)"
                      $sasToken = "$(DEPLOY_SAS_TOKEN)"
                      $resourceGroup = "$(DEPLOY_RESOURCE_GROUP)"
                      $machineName = "$(deployHost)"
                      
                      # Create deployment script
                      $script = @"
                      #!/bin/bash
                      set -e
                      
                      # Download artifacts from storage
                      STORAGE_URL="https://$storageAccount.blob.core.windows.net/$containerName"
                      mkdir -p /tmp/hartonomous-deploy/{api,worker,web}
                      
                      # Use Azure CLI with managed identity to download
                      az login --identity
                      az storage blob download-batch --source $containerName --destination /tmp/hartonomous-deploy/api --pattern "api/*" --account-name $storageAccount --auth-mode login
                      az storage blob download-batch --source $containerName --destination /tmp/hartonomous-deploy/worker --pattern "worker/*" --account-name $storageAccount --auth-mode login
                      az storage blob download-batch --source $containerName --destination /tmp/hartonomous-deploy/web --pattern "web/*" --account-name $storageAccount --auth-mode login
                      az storage blob download --container-name $containerName --name deploy-app.sh --file /tmp/hartonomous-deploy/deploy-app.sh --account-name $storageAccount --auth-mode login
                      
                      # Execute deployment
                      chmod +x /tmp/hartonomous-deploy/deploy-app.sh
                      sudo REMOTE_DEPLOY=false /tmp/hartonomous-deploy/deploy-app.sh ${{ parameters.deploymentEnvironment }} all
                      
                      # Cleanup
                      rm -rf /tmp/hartonomous-deploy
                      "@
                      
                      # Execute via Run Command
                      az connectedmachine run-command create `
                        --resource-group $resourceGroup `
                        --machine-name $machineName `
                        --name "deploy-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$script" `
                        --timeout-in-seconds 1800
                
                - task: AzureCLI@2
                  displayName: 'Cleanup Storage Container'
                  condition: always()
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "$(DEPLOY_CONTAINER)"
                      az storage container delete --name $containerName --account-name $storageAccount --auth-mode login
      
      - deployment: DeployWindows
        displayName: 'Deploy to Arc-enabled Windows Server'
        condition: eq('${{ parameters.deploymentOS }}', 'Windows')
        environment: '${{ parameters.deploymentEnvironment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                
                - download: current
                  artifact: api-drop
                
                - download: current
                  artifact: worker-drop
                
                - download: current
                  artifact: web-drop
                
                - task: AzureCLI@2
                  displayName: 'Upload Artifacts to Storage'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Create temporary storage container for deployment artifacts
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "deployments-$(Build.BuildId)"
                      
                      # Upload artifacts
                      az storage container create --name $containerName --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/api-drop" --destination-path "api" --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/worker-drop" --destination-path "worker" --account-name $storageAccount --auth-mode login
                      az storage blob upload-batch --destination $containerName --source "$(Pipeline.Workspace)/web-drop" --destination-path "web" --account-name $storageAccount --auth-mode login
                      az storage blob upload --container-name $containerName --file "$(Build.SourcesDirectory)/deploy/Deploy-App.ps1" --name "Deploy-App.ps1" --account-name $storageAccount --auth-mode login
                      
                      # Generate SAS token (1 hour expiry)
                      $expiry = (Get-Date).AddHours(1).ToString("yyyy-MM-ddTHH:mm:ssZ")
                      $sasToken = az storage container generate-sas --name $containerName --account-name $storageAccount --permissions r --expiry $expiry --auth-mode login --as-user --output tsv
                      Write-Host "##vso[task.setvariable variable=DEPLOY_CONTAINER]$containerName"
                      Write-Host "##vso[task.setvariable variable=DEPLOY_SAS_TOKEN]$sasToken"
                
                - task: AzureCLI@2
                  displayName: 'Deploy via Azure Arc Run Command'
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      # Execute deployment script via Arc Run Command
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "$(DEPLOY_CONTAINER)"
                      $sasToken = "$(DEPLOY_SAS_TOKEN)"
                      $resourceGroup = "$(DEPLOY_RESOURCE_GROUP)"
                      $machineName = "$(deployHost)"
                      
                      # Create deployment script
                      $script = @"
                      # Download artifacts from storage
                      `$storageUrl = "https://$storageAccount.blob.core.windows.net/$containerName"
                      `$tempPath = "C:\Temp\hartonomous-deploy-$(Build.BuildId)"
                      New-Item -Path `$tempPath -ItemType Directory -Force | Out-Null
                      
                      # Use Azure CLI with managed identity to download
                      az login --identity
                      az storage blob download-batch --source $containerName --destination "`$tempPath\api" --pattern "api/*" --account-name $storageAccount --auth-mode login
                      az storage blob download-batch --source $containerName --destination "`$tempPath\worker" --pattern "worker/*" --account-name $storageAccount --auth-mode login
                      az storage blob download-batch --source $containerName --destination "`$tempPath\web" --pattern "web/*" --account-name $storageAccount --auth-mode login
                      az storage blob download --container-name $containerName --name Deploy-App.ps1 --file "`$tempPath\Deploy-App.ps1" --account-name $storageAccount --auth-mode login
                      
                      # Execute deployment
                      & "`$tempPath\Deploy-App.ps1" -Environment "${{ parameters.deploymentEnvironment }}" -Component all -ApiArtifact "`$tempPath\api" -WorkerArtifact "`$tempPath\worker" -WebArtifact "`$tempPath\web"
                      
                      # Cleanup
                      Remove-Item -Path `$tempPath -Recurse -Force
                      "@
                      
                      # Execute via Run Command
                      az connectedmachine run-command create `
                        --resource-group $resourceGroup `
                        --machine-name $machineName `
                        --name "deploy-${{ parameters.deploymentEnvironment }}-$(Build.BuildId)" `
                        --script "$script" `
                        --timeout-in-seconds 1800
                
                - task: AzureCLI@2
                  displayName: 'Cleanup Storage Container'
                  condition: always()
                  inputs:
                    azureSubscription: 'Azure-Service-Connection'
                    scriptType: 'pscore'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      $storageAccount = "$(DEPLOY_STORAGE_ACCOUNT)"
                      $containerName = "$(DEPLOY_CONTAINER)"
                      az storage container delete --name $containerName --account-name $storageAccount --auth-mode login
      - job: PublishAPI
        displayName: 'Publish API'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.API/Hartonomous.API.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
              ArtifactName: 'api-drop'

      - job: PublishWorker
        displayName: 'Publish Worker'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Worker'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.Worker/Hartonomous.Worker.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/worker'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/worker'
              ArtifactName: 'worker-drop'

      - job: PublishWeb
        displayName: 'Publish Blazor Web'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Web'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.App/Hartonomous.App.Web/Hartonomous.App.Web.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/web'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/web'
              ArtifactName: 'web-drop'
