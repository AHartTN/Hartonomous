# Enterprise Multi-Stage Deployment Pipeline
# Platform-agnostic CI/CD with proper deployment tracking, approvals, and rollback
# Copyright (c) 2025 Anthony Hart. All Rights Reserved.

trigger:
  branches:
    include:
    - develop
    - main

variables:
  buildConfiguration: 'Release'
  artifactName: 'hartonomous-api'

stages:
# ============================================================================
# BUILD STAGE - Build once, deploy everywhere
# ============================================================================
- stage: Build
  displayName: 'Build & Package'
  jobs:
  - job: BuildJob
    displayName: 'Build Application'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UsePythonVersion@0
      displayName: 'Use Python 3.x'
      inputs:
        versionSpec: '3.x'
    
    - script: |
        cd api
        pip install -r requirements.txt --target .
      displayName: 'Install Dependencies'
    
    - task: ArchiveFiles@2
      displayName: 'Package Application'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
        replaceExistingArchive: true
    
    - publish: '$(Build.ArtifactStagingDirectory)/$(artifactName).zip'
      artifact: $(artifactName)
      displayName: 'Publish Build Artifact'

# ============================================================================
# DEVELOPMENT STAGE - Auto-deploy on develop branch
# ============================================================================
- stage: Development
  displayName: 'Deploy to Development'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: DeployDev
    displayName: 'Development Deployment'
    pool:
      name: 'Default'
      demands:
      - Agent.Name -equals HART-DESKTOP
    environment: 'development'
    strategy:
      runOnce:
        preDeploy:
          steps:
          - script: echo "Pre-deployment validation for development"
            displayName: 'Pre-Deployment Checks'
        
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)
            displayName: 'Download Artifact'
          
          - pwsh: |
              # Load config from Azure App Configuration
              $installPath = az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "deployment:development:install_path" --query value -o tsv
              $apiHost = az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "api:development:host" --query value -o tsv
              $apiPort = az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "api:development:port" --query value -o tsv
              
              # Get connection string template and password from Key Vault
              $connStr = az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "ConnectionStrings:PostgreSQL-HART-DESKTOP" --query value -o tsv
              $password = az keyvault secret show --vault-name kv-hartonomous --name "PostgreSQL-Hartonomous-Password" --query value -o tsv
              
              # Build full connection string with password
              $dbUrl = "$connStr;Password=$password"
              
              Write-Host "##vso[task.setvariable variable=InstallPath]$installPath"
              Write-Host "##vso[task.setvariable variable=ApiHost]$apiHost"
              Write-Host "##vso[task.setvariable variable=ApiPort]$apiPort"
              Write-Host "##vso[task.setvariable variable=DatabaseUrl;issecret=true]$dbUrl"
            displayName: 'Load Azure Configuration'
          
          - task: ExtractFiles@1
            displayName: 'Extract Application'
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip'
              destinationFolder: '$(InstallPath)'
              cleanDestinationFolder: false
          
          - pwsh: |
              cd "$(InstallPath)"
              if (-not (Test-Path ".venv")) {
                python -m venv .venv
              }
              .\.venv\Scripts\Activate.ps1
              pip install -q -r requirements.txt
            displayName: 'Setup Python Environment'
          
          - pwsh: |
              @"
              DATABASE_URL=$(DatabaseUrl)
              API_HOST=$(ApiHost)
              API_PORT=$(ApiPort)
              ENVIRONMENT=development
              "@ | Set-Content -Path "$(InstallPath)\.env"
            displayName: 'Configure Application'
          
          - pwsh: |
              cd "$(InstallPath)"
              .\.venv\Scripts\Activate.ps1
              if (Test-Path "alembic.ini") {
                alembic upgrade head
              }
            displayName: 'Run Database Migrations'
          
          - pwsh: |
              Get-Process | Where-Object { $_.CommandLine -like "*uvicorn*main:app*" } | Stop-Process -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
              
              cd "$(InstallPath)"
              $pythonExe = Join-Path (Get-Location) ".venv\Scripts\python.exe"
              $apiHost = (Get-Content .env | Select-String "API_HOST=").ToString().Split("=")[1]
              $apiPort = (Get-Content .env | Select-String "API_PORT=").ToString().Split("=")[1]
              
              Start-Process -FilePath $pythonExe -ArgumentList "-m","uvicorn","main:app","--host",$apiHost,"--port",$apiPort -WindowStyle Hidden
            displayName: 'Start Application Service'
        
        postRouteTraffic:
          steps:
          - pwsh: |
              Start-Sleep -Seconds 5
              $response = Invoke-WebRequest -Uri "http://localhost:8000/v1/health" -TimeoutSec 10 -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "? Health check passed"
              } else {
                Write-Error "Health check failed"
                exit 1
              }
            displayName: 'Validate Deployment'
        
        on:
          failure:
            steps:
            - pwsh: |
                Write-Host "?? Deployment failed - initiating rollback"
                # Rollback logic here if needed
              displayName: 'Rollback on Failure'
          
          success:
            steps:
            - pwsh: Write-Host "? Development deployment successful"
              displayName: 'Deployment Success'

# ============================================================================
# STAGING STAGE - Requires dev success + manual approval
# ============================================================================
- stage: Staging
  displayName: 'Deploy to Staging'
  dependsOn: Development
  condition: succeeded()
  jobs:
  - deployment: DeployStaging
    displayName: 'Staging Deployment'
    pool:
      name: 'Default'
      demands:
      - Agent.OS -equals Linux
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)
          
          - bash: |
              INSTALL_PATH=$(az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "deployment:staging:install_path" --query value -o tsv)
              echo "##vso[task.setvariable variable=InstallPath]$INSTALL_PATH"
            displayName: 'Load Configuration'
          
          - task: ExtractFiles@1
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip'
              destinationFolder: '$(InstallPath)'
          
          - bash: |
              cd "$(InstallPath)"
              python3 -m venv .venv
              source .venv/bin/activate
              pip install -q -r requirements.txt
              alembic upgrade head
            displayName: 'Deploy & Migrate'

# ============================================================================
# PRODUCTION STAGE - Requires staging + main branch + approval
# ============================================================================
- stage: Production
  displayName: 'Deploy to Production'
  dependsOn: Staging
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProduction
    displayName: 'Production Deployment'
    pool:
      name: 'Default'
      demands:
      - Agent.OS -equals Linux
    environment: 'production'
    strategy:
      runOnce:
        preDeploy:
          steps:
          - script: echo "?? Production pre-deployment validation"
            displayName: 'Production Safety Checks'
        
        deploy:
          steps:
          - download: current
            artifact: $(artifactName)
          
          - bash: |
              INSTALL_PATH=$(az appconfig kv show --name appconfig-hartonomous --auth-mode login --key "deployment:production:install_path" --query value -o tsv)
              echo "##vso[task.setvariable variable=InstallPath]$INSTALL_PATH"
            displayName: 'Load Configuration'
          
          - task: ExtractFiles@1
            inputs:
              archiveFilePatterns: '$(Pipeline.Workspace)/$(artifactName)/$(artifactName).zip'
              destinationFolder: '$(InstallPath)'
          
          - bash: |
              cd "$(InstallPath)"
              python3 -m venv .venv
              source .venv/bin/activate
              pip install -q -r requirements.txt
              alembic upgrade head
            displayName: 'Deploy & Migrate'
        
        postRouteTraffic:
          steps:
          - bash: |
              sleep 5
              curl -f http://localhost:8000/v1/health || exit 1
            displayName: 'Production Health Check'
        
        on:
          failure:
            steps:
            - bash: echo "?? PRODUCTION DEPLOYMENT FAILED - Manual intervention required"
              displayName: 'Production Failure Alert'
