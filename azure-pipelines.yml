# Azure Multi-Stage Pipeline - Platform Agnostic
# Authentication: Uses Azure service connection with Managed Identity or Service Principal
# Configuration: Azure App Configuration + Key Vault references
# Target: Any machine (Windows/Linux, Azure/Arc/On-prem) with Azure CLI installed

trigger:
  branches:
    include:
    - develop
    - main

variables:
  APP_CONFIG_NAME: 'appconfig-hartonomous'
  RESOURCE_GROUP: 'rg-hartonomous'

stages:
- stage: Build
  displayName: 'Build Package'
  jobs:
  - job: Package
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/api'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
    
    - publish: $(Build.ArtifactStagingDirectory)/api.zip
      artifact: api-package

- stage: DeployDev
  displayName: 'Development'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: Deploy
    environment: development
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - download: current
            artifact: api-package
          
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: '$(Build.SourcesDirectory)/deployment/deploy.sh'
              arguments: 'development $(Pipeline.Workspace)/api-package/api.zip'

- stage: DeployStaging
  displayName: 'Staging'
  dependsOn: DeployDev
  jobs:
  - deployment: Deploy
    environment: staging
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - download: current
            artifact: api-package
          
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: '$(Build.SourcesDirectory)/deployment/deploy.sh'
              arguments: 'staging $(Pipeline.Workspace)/api-package/api.zip'

- stage: DeployProd
  displayName: 'Production'
  dependsOn: DeployStaging
  condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
  jobs:
  - deployment: Deploy
    environment: production
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          
          - download: current
            artifact: api-package
          
          - task: AzureCLI@2
            inputs:
              azureSubscription: 'Azure-ServiceConnection'
              scriptType: 'bash'
              scriptLocation: 'scriptPath'
              scriptPath: '$(Build.SourcesDirectory)/deployment/deploy.sh'
              arguments: 'production $(Pipeline.Workspace)/api-package/api.zip'
