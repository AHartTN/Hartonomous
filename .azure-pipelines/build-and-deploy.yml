trigger:
  branches:
    include:
      - main
      - develop
  tags:
    include:
      - v*

# Local Agent Pool - can use Linux or Windows
pool:
  name: 'Local Agent Pool'

variables:
  buildConfiguration: 'Release'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  keyVaultName: 'hartonomous-kv'
  certName: 'HartIndustries-CodeSigning'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildNonMAUI
        displayName: 'Build Non-MAUI Projects'
        pool:
          name: 'Local Agent Pool'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              version: '10.x'
              includePreviewVersions: true

          - task: AzureKeyVault@2
            displayName: 'Get Certificate from Key Vault'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              KeyVaultName: '$(keyVaultName)'
              SecretsFilter: '$(certName)'
              RunAsPreJob: true

          - task: PowerShell@2
            displayName: 'Install Certificate from Key Vault'
            inputs:
              targetType: 'inline'
              script: |
                # Certificate is automatically downloaded as base64
                $certBase64 = "$($(certName))"
                $certBytes = [Convert]::FromBase64String($certBase64)
                
                # Import without password (Key Vault stores it securely)
                $cert = [System.Security.Cryptography.X509Certificates.X509Certificate2]::new($certBytes)
                $store = [System.Security.Cryptography.X509Certificates.X509Store]::new(
                    [System.Security.Cryptography.X509Certificates.StoreName]::My,
                    [System.Security.Cryptography.X509Certificates.StoreLocation]::CurrentUser
                )
                $store.Open([System.Security.Cryptography.X509Certificates.OpenFlags]::ReadWrite)
                $store.Add($cert)
                $store.Close()
                
                Write-Host "? Certificate installed: $($cert.Thumbprint)"

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet Packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build Non-MAUI Projects'
            inputs:
              command: 'build'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj
                Hartonomous.ServiceDefaults/Hartonomous.ServiceDefaults.csproj
                Hartonomous.Api/Hartonomous.Api.csproj
                Hartonomous.Worker/Hartonomous.Worker.csproj
                Hartonomous.AppHost/Hartonomous.AppHost.csproj
                Hartonomous.App/Hartonomous.App.Web/Hartonomous.App.Web.csproj
                Hartonomous.App/Hartonomous.App.Web.Client/Hartonomous.App.Web.Client.csproj
                Hartonomous.App/Hartonomous.App.Shared/Hartonomous.App.Shared.csproj
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run Tests'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --collect:"XPlat Code Coverage"'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish Code Coverage'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/*.cobertura.xml'

      - job: BuildMAUI
        displayName: 'Build MAUI App (Windows)'
        pool:
          name: 'Local Agent Pool'
          demands:
            - Agent.OS -equals Windows_NT
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              version: '10.x'
              includePreviewVersions: true

          - task: PowerShell@2
            displayName: 'Install .NET MAUI Workload'
            inputs:
              targetType: 'inline'
              script: |
                dotnet workload install maui --source https://api.nuget.org/v3/index.json
                dotnet workload list

          - task: DotNetCoreCLI@2
            displayName: 'Restore MAUI App'
            inputs:
              command: 'restore'
              projects: 'Hartonomous.App/Hartonomous.App/Hartonomous.App.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build MAUI App for Windows'
            inputs:
              command: 'build'
              projects: 'Hartonomous.App/Hartonomous.App/Hartonomous.App.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore --framework net10.0-windows10.0.19041.0 /p:BuildInParallel=false /maxcpucount:1'

  - stage: Package
    displayName: 'Create NuGet Packages'
    dependsOn: Build
    condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), startsWith(variables['Build.SourceBranch'], 'refs/tags/v')))
    jobs:
      - job: Pack
        displayName: 'Pack and Sign NuGet'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              version: '10.x'
              includePreviewVersions: true

          - task: AzureKeyVault@2
            displayName: 'Get Certificate from Key Vault'
            inputs:
              azureSubscription: 'Azure-Service-Connection'
              KeyVaultName: '$(keyVaultName)'
              SecretsFilter: '$(certName)'
              RunAsPreJob: true

          - task: PowerShell@2
            displayName: 'Export Certificate for NuGet Signing'
            inputs:
              targetType: 'inline'
              script: |
                $certBase64 = "$($(certName))"
                $certBytes = [Convert]::FromBase64String($certBase64)
                $certPath = "$(Agent.TempDirectory)\cert.pfx"
                [IO.File]::WriteAllBytes($certPath, $certBytes)
                Write-Host "##vso[task.setvariable variable=CertPath]$certPath"

          - task: DotNetCoreCLI@2
            displayName: 'Restore Packable Projects'
            inputs:
              command: 'restore'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj

          - task: DotNetCoreCLI@2
            displayName: 'Build Packable Projects'
            inputs:
              command: 'build'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Create NuGet Packages'
            inputs:
              command: 'custom'
              custom: 'pack'
              arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)/packages'
              projects: |
                Hartonomous.Core/Hartonomous.Core.csproj
                Hartonomous.Data/Hartonomous.Data.csproj
                Hartonomous.Infrastructure/Hartonomous.Infrastructure.csproj

          - task: NuGetCommand@2
            displayName: 'Sign NuGet Packages'
            inputs:
              command: 'custom'
              arguments: 'sign $(Build.ArtifactStagingDirectory)/packages/*.nupkg -CertificatePath $(CertPath) -Timestamper http://timestamp.digicert.com -NonInteractive'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish NuGet Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/packages'
              ArtifactName: 'nuget-packages'

  - stage: PublishNuGet
    displayName: 'Publish to NuGet.org'
    dependsOn: Package
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - deployment: PublishNuGet
        displayName: 'Push to NuGet.org'
        environment: 'NuGet-Production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NuGetCommand@2
                  displayName: 'Push to NuGet.org'
                  inputs:
                    command: 'push'
                    packagesToPush: '$(Pipeline.Workspace)/**/*.nupkg;!$(Pipeline.Workspace)/**/*.symbols.nupkg'
                    nuGetFeedType: 'external'
                    publishFeedCredentials: 'NuGet.org'

  - stage: PublishApps
    displayName: 'Publish Applications'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: PublishAPI
        displayName: 'Publish API Artifact'
        pool:
          name: 'Local Agent Pool'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish API'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.Api/Hartonomous.Api.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
              ArtifactName: 'api-drop'

      - job: PublishWorker
        displayName: 'Publish Worker Artifact'
        pool:
          name: 'Local Agent Pool'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Worker'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.Worker/Hartonomous.Worker.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/worker'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/worker'
              ArtifactName: 'worker-drop'

      - job: PublishWeb
        displayName: 'Publish Blazor Web Artifact'
        pool:
          name: 'Local Agent Pool'
        steps:
          - task: DotNetCoreCLI@2
            displayName: 'Publish Web'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: 'Hartonomous.App/Hartonomous.App.Web/Hartonomous.App.Web.csproj'
              arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/web'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/web'
              ArtifactName: 'web-drop'

  - stage: Deploy
    displayName: 'Deploy to Arc Servers'
    dependsOn: PublishApps
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployAPI
        displayName: 'Deploy API to Linux'
        environment:
          name: 'Primary Local'
          resourceType: VirtualMachine
          tags: linux
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'api-drop'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: Bash@3
                  displayName: 'Initialize Infrastructure (Idempotent)'
                  inputs:
                    targetType: 'inline'
                    workingDirectory: '$(Build.SourcesDirectory)/deployment'
                    script: |
                      set -e

                      echo "=== Infrastructure Initialization ==="

                      # 1. Install systemd services if not present
                      if [ ! -f /etc/systemd/system/hartonomous-api.service ]; then
                        echo "Installing systemd services..."
                        sudo cp systemd/hartonomous-api.service /etc/systemd/system/
                        sudo cp systemd/hartonomous-worker.service /etc/systemd/system/
                        sudo systemctl daemon-reload
                        sudo systemctl enable hartonomous-api.service
                        sudo systemctl enable hartonomous-worker.service
                        echo "✓ Services installed"
                      else
                        echo "✓ Services already installed"
                      fi

                      # 2. Initialize PostgreSQL database if not exists
                      if sudo -u postgres psql -lqt | cut -d \| -f 1 | grep -qw hartonomous; then
                        echo "✓ Database 'hartonomous' already exists"
                      else
                        echo "Initializing PostgreSQL database..."
                        # Get password from Azure Key Vault via managed identity
                        DB_PASS=$(az keyvault secret show --vault-name hartonomous-kv --name PostgreSQL-Production --query value -o tsv 2>/dev/null || echo "CHANGE_ME")

                        # Create temp SQL file with password
                        TMP_SQL=$(mktemp)
                        sed "s/CHANGE_ME_STRONG_PASSWORD/$DB_PASS/g" database/init-postgresql.sql > "$TMP_SQL"

                        # Initialize database
                        sudo -u postgres psql -f "$TMP_SQL"
                        rm -f "$TMP_SQL"
                        echo "✓ Database initialized"
                      fi

                      # 3. Configure Redis for production if needed
                      if ! grep -q "^dir /var/lib/redis" /etc/redis/redis.conf; then
                        echo "Configuring Redis..."
                        sudo sed -i 's|^dir .*|dir /var/lib/redis|g' /etc/redis/redis.conf
                        sudo sed -i 's/^# maxmemory-policy.*/maxmemory-policy allkeys-lru/' /etc/redis/redis.conf
                        sudo sed -i 's/^# maxmemory.*/maxmemory 16gb/' /etc/redis/redis.conf
                        sudo sed -i 's/^appendonly no/appendonly yes/' /etc/redis/redis.conf
                        sudo systemctl restart redis-server
                        echo "✓ Redis configured"
                      else
                        echo "✓ Redis already configured"
                      fi

                      # 4. Install Nginx configuration if not present
                      if [ ! -f /etc/nginx/sites-available/hartonomous-api.conf ]; then
                        echo "Installing Nginx configuration..."
                        sudo apt install -y nginx
                        sudo mkdir -p /var/www/certbot
                        sudo cp nginx/hartonomous-api.conf /etc/nginx/sites-available/
                        sudo ln -sf /etc/nginx/sites-available/hartonomous-api.conf /etc/nginx/sites-enabled/
                        sudo nginx -t && sudo systemctl reload nginx
                        echo "✓ Nginx configured"
                      else
                        echo "✓ Nginx already configured"
                      fi

                      echo "=== Infrastructure Ready ==="

                - task: Bash@3
                  displayName: 'Deploy API Application'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      echo "=== Deploying API ==="

                      # Stop service before deployment
                      sudo systemctl stop hartonomous-api || true

                      # Deploy application
                      sudo mkdir -p /srv/www/hartonomous/api
                      sudo unzip -o $(System.ArtifactsDirectory)/api-drop/*.zip -d /srv/www/hartonomous/api
                      sudo chmod +x /srv/www/hartonomous/api/Hartonomous.Api

                      # Deploy configuration
                      sudo cp $(Build.SourcesDirectory)/deployment/config/appsettings.Production.json /srv/www/hartonomous/api/

                      # Set ownership
                      sudo chown -R www-data:www-data /srv/www/hartonomous/api

                      # Start service
                      sudo systemctl start hartonomous-api

                      # Wait for service to start
                      sleep 3

                      # Check status
                      if sudo systemctl is-active --quiet hartonomous-api; then
                        echo "✓ API service started successfully"
                        sudo systemctl status hartonomous-api --no-pager -l
                      else
                        echo "❌ API service failed to start"
                        sudo journalctl -u hartonomous-api -n 50 --no-pager
                        exit 1
                      fi

      - deployment: DeployWorker
        displayName: 'Deploy Worker to Linux'
        environment:
          name: 'Primary Local'
          resourceType: VirtualMachine
          tags: linux
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'worker-drop'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: Bash@3
                  displayName: 'Deploy Worker Application'
                  inputs:
                    targetType: 'inline'
                    script: |
                      set -e

                      echo "=== Deploying Worker ==="

                      # Stop service before deployment
                      sudo systemctl stop hartonomous-worker || true

                      # Deploy application
                      sudo mkdir -p /srv/www/hartonomous/worker
                      sudo unzip -o $(System.ArtifactsDirectory)/worker-drop/*.zip -d /srv/www/hartonomous/worker
                      sudo chmod +x /srv/www/hartonomous/worker/Hartonomous.Worker

                      # Deploy configuration
                      sudo cp $(Build.SourcesDirectory)/deployment/config/appsettings.Production.json /srv/www/hartonomous/worker/

                      # Set ownership
                      sudo chown -R www-data:www-data /srv/www/hartonomous/worker

                      # Start service
                      sudo systemctl start hartonomous-worker

                      # Wait for service to start
                      sleep 3

                      # Check status
                      if sudo systemctl is-active --quiet hartonomous-worker; then
                        echo "✓ Worker service started successfully"
                        sudo systemctl status hartonomous-worker --no-pager -l
                      else
                        echo "❌ Worker service failed to start"
                        sudo journalctl -u hartonomous-worker -n 50 --no-pager
                        exit 1
                      fi

      - deployment: DeployWeb
        displayName: 'Deploy Blazor Web to Windows'
        environment:
          name: 'Primary Local'
          resourceType: VirtualMachine
          tags: windows
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@1
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'web-drop'
                    downloadPath: '$(System.ArtifactsDirectory)'

                - task: PowerShell@2
                  displayName: 'Initialize IIS Infrastructure (Idempotent)'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "=== IIS Infrastructure Initialization ==="

                      # Ensure IIS is installed
                      $iisFeature = Get-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole
                      if ($iisFeature.State -ne "Enabled") {
                        Write-Host "Installing IIS..."
                        Enable-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole -All -NoRestart
                        Write-Host "✓ IIS installed"
                      } else {
                        Write-Host "✓ IIS already installed"
                      }

                      # Ensure ASP.NET Core Hosting Bundle is installed
                      Import-Module WebAdministration

                      # Create app pool if not exists
                      if (-not (Test-Path "IIS:\AppPools\HartonomousWeb")) {
                        Write-Host "Creating app pool HartonomousWeb..."
                        New-WebAppPool -Name "HartonomousWeb"
                        Set-ItemProperty "IIS:\AppPools\HartonomousWeb" -Name "managedRuntimeVersion" -Value ""
                        Set-ItemProperty "IIS:\AppPools\HartonomousWeb" -Name "startMode" -Value "AlwaysRunning"
                        Set-ItemProperty "IIS:\AppPools\HartonomousWeb" -Name "processModel.idleTimeout" -Value "00:00:00"
                        Write-Host "✓ App pool created"
                      } else {
                        Write-Host "✓ App pool already exists"
                      }

                      # Create site if not exists
                      if (-not (Test-Path "IIS:\Sites\HartonomousWeb")) {
                        Write-Host "Creating IIS site..."
                        New-Website -Name "HartonomousWeb" `
                          -PhysicalPath "D:\inetpub\hartonomous\web" `
                          -ApplicationPool "HartonomousWeb" `
                          -Port 80 `
                          -HostHeader "web.hartonomous.local"
                        Write-Host "✓ IIS site created"
                      } else {
                        Write-Host "✓ IIS site already exists"
                      }

                      Write-Host "=== IIS Infrastructure Ready ==="

                - task: PowerShell@2
                  displayName: 'Deploy Web Application'
                  inputs:
                    targetType: 'inline'
                    script: |
                      Write-Host "=== Deploying Web Application ==="

                      # Stop app pool
                      Import-Module WebAdministration
                      Stop-WebAppPool -Name "HartonomousWeb"
                      Start-Sleep -Seconds 2

                      # Deploy application to D: drive (2x 2TB 990 EVO NVMe)
                      $deployPath = "D:\inetpub\hartonomous\web"
                      New-Item -ItemType Directory -Force -Path $deployPath

                      # Extract with overwrite
                      Expand-Archive -Path "$(System.ArtifactsDirectory)\web-drop\*.zip" -DestinationPath $deployPath -Force

                      # Deploy configuration
                      Copy-Item "$(Build.SourcesDirectory)\deployment\config\appsettings.Production.json" -Destination $deployPath -Force

                      # Start app pool
                      Start-WebAppPool -Name "HartonomousWeb"
                      Start-Sleep -Seconds 3

                      # Verify site is running
                      $state = Get-WebAppPoolState -Name "HartonomousWeb"
                      if ($state.Value -eq "Started") {
                        Write-Host "✓ Web application deployed and running"
                      } else {
                        Write-Host "❌ Web application failed to start"
                        Get-EventLog -LogName Application -Source "IIS*" -Newest 10 | Format-List
                        exit 1
                      }
