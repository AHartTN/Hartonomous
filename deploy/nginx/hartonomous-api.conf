# Hartonomous API - Nginx Configuration
# Place in: /etc/nginx/sites-available/hartonomous-api
# Enable with: sudo ln -s /etc/nginx/sites-available/hartonomous-api /etc/nginx/sites-enabled/

upstream hartonomous_api {
    server localhost:5000;
    keepalive 32;
}

# HTTP - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.hartonomous.local hartonomous-api.local;

    # Let's Encrypt certificate validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.hartonomous.local hartonomous-api.local;

    # SSL Certificate paths (update after obtaining certificates)
    ssl_certificate /etc/letsencrypt/live/api.hartonomous.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.hartonomous.local/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Logging
    access_log /var/log/nginx/hartonomous-api-access.log;
    error_log /var/log/nginx/hartonomous-api-error.log;

    # Max body size for uploads
    client_max_body_size 100M;

    # Proxy to Kestrel
    location / {
        proxy_pass http://hartonomous_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://hartonomous_api/health;
        access_log off;
    }
}
