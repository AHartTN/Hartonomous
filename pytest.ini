[pytest]
# Pytest Configuration for Hartonomous API

# Python files to search for tests
python_files = test_*.py *_test.py

# Python classes to search for tests
python_classes = Test*

# Python functions to search for tests
python_functions = test_*

# Directories to search for tests
testpaths = api/tests

# Additional options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --maxfail=10
    -ra

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database, services)
    slow: Tests that take significant time to run
    asyncio: Async tests

# Asyncio configuration
asyncio_mode = auto

# Coverage configuration (when using pytest-cov)
[coverage:run]
source = api
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */alembic/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
