[pytest]
# Pytest Configuration for Hartonomous - Enterprise Test Suite

# Python files to search for tests
python_files = test_*.py *_test.py

# Python classes to search for tests
python_classes = Test*

# Python functions to search for tests
python_functions = test_*

# Directories to search for tests (consolidated structure)
testpaths = tests

# Additional options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --maxfail=10
    -ra
    --durations=10
    --color=yes

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require database, services)
    functional: End-to-end functional tests
    smoke: Smoke tests (quick validation)
    asyncio: Async tests
    gguf: GGUF model ingestion tests
    safetensors: SafeTensors model ingestion tests
    sql: PostgreSQL/SQL function tests
    spatial: Spatial/Hilbert curve tests
    compression: Compression algorithm tests
    gpu: Tests requiring GPU acceleration
    performance: Performance benchmark tests
    cicd: Tests suitable for CI/CD pipeline

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Coverage configuration (when using pytest-cov)
[coverage:run]
source = api
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */alembic/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
