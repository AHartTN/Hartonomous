version: '3.8'

services:
  # PostgreSQL with PostGIS + AGE + PL/Python
  postgres:
    image: postgres:15-alpine
    container_name: hartonomous-postgres
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-hartonomous}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hartonomous-network
  
  # FastAPI application
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hartonomous-api
    environment:
      DATABASE_URL: postgresql://${PGUSER:-postgres}:${PGPASSWORD:-postgres}@postgres:5432/${PGDATABASE:-hartonomous}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: INFO
      AGE_WORKER_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - /tmp:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hartonomous-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:

networks:
  hartonomous-network:
    driver: bridge
