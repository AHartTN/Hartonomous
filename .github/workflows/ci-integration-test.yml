name: CI - Integration Test

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-deployment:
    name: Validate Deployment Works
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hartonomous_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Python is installed
        run: |
          if ! command -v python3 &> /dev/null; then
            echo "ERROR: Python 3 not found"
            exit 1
          fi
          python3 --version
          echo "? Python installed"

      - name: Install dependencies
        working-directory: ./api
        run: |
          python3 -m pip install -r requirements.txt

      - name: Deploy database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: hartonomous_test
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          if [ -d "./database/schema" ]; then
            for sql_file in ./database/schema/*.sql; do
              echo "Applying: $sql_file"
              psql -f "$sql_file"
            done
            echo "? Database schema deployed"
          fi

      - name: Start API
        working-directory: ./api
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: hartonomous_test
          PGUSER: postgres
          PGPASSWORD: postgres
          API_HOST: 0.0.0.0
          API_PORT: 8000
        run: |
          python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
          echo "? API started"

      - name: Test API health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          if [ "$response" -eq 200 ]; then
            echo "? API health check passed"
          else
            echo "? API health check failed (HTTP $response)"
            exit 1
          fi

      - name: Test database connectivity
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGDATABASE: hartonomous_test
          PGUSER: postgres
          PGPASSWORD: postgres
        run: |
          if psql -c "SELECT 1" > /dev/null 2>&1; then
            echo "? Database connection works"
          else
            echo "? Database connection failed"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "? Python installation validated" >> $GITHUB_STEP_SUMMARY
          echo "? Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "? Database schema deployed" >> $GITHUB_STEP_SUMMARY
          echo "? API started successfully" >> $GITHUB_STEP_SUMMARY
          echo "? Health endpoint responding" >> $GITHUB_STEP_SUMMARY
          echo "? Database connectivity verified" >> $GITHUB_STEP_SUMMARY
