name: CIAM - User Provisioning

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (development/staging/production)'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - provision-test-users
          - cleanup-test-users
          - sync-b2c-policies
          - verify-ciam-config

jobs:
  provision-users:
    name: Provision Test Users
    if: inputs.action == 'provision-test-users'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Provision test users in B2C
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          B2C_TENANT_ID: ${{ secrets.B2C_TENANT_ID }}
          B2C_CLIENT_ID: ${{ secrets.B2C_CLIENT_ID }}
          B2C_CLIENT_SECRET: ${{ secrets.B2C_CLIENT_SECRET }}
        run: |
          chmod +x ./deployment/scripts/ciam/provision-test-users.sh
          ./deployment/scripts/ciam/provision-test-users.sh

  cleanup-users:
    name: Cleanup Test Users
    if: inputs.action == 'cleanup-test-users'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Cleanup test users
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          B2C_TENANT_ID: ${{ secrets.B2C_TENANT_ID }}
        run: |
          chmod +x ./deployment/scripts/ciam/cleanup-test-users.sh
          ./deployment/scripts/ciam/cleanup-test-users.sh

  sync-policies:
    name: Sync B2C Policies
    if: inputs.action == 'sync-b2c-policies'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy B2C custom policies
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          B2C_TENANT_NAME: ${{ secrets.B2C_TENANT_NAME }}
        run: |
          chmod +x ./deployment/scripts/ciam/deploy-b2c-policies.sh
          ./deployment/scripts/ciam/deploy-b2c-policies.sh

  verify-config:
    name: Verify CIAM Configuration
    if: inputs.action == 'verify-ciam-config'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify CIAM setup
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          B2C_TENANT_ID: ${{ secrets.B2C_TENANT_ID }}
          ENTRA_TENANT_ID: ${{ secrets.ENTRA_TENANT_ID }}
        run: |
          chmod +x ./deployment/scripts/ciam/verify-ciam-config.sh
          ./deployment/scripts/ciam/verify-ciam-config.sh
