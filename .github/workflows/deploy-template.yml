name: Deployment Template (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      runner_labels:
        description: 'Runner labels as JSON array'
        required: true
        type: string
      git_ref:
        description: 'Git reference to deploy'
        required: false
        type: string
        default: ''
      skip_validation:
        description: 'Skip validation'
        required: false
        type: boolean
        default: false
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      KEY_VAULT_URL:
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  backup:
    name: Backup Database
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment }}
    outputs:
      backup_path: ${{ steps.backup.outputs.backup_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run database backup
        id: backup
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\core\backup.ps1 -Component database

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ inputs.environment }}-${{ github.sha }}
          path: ${{ steps.backup.outputs.backup_path }}
          retention-days: 30

  build:
    name: Copy and Prepare Artifacts
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment }}
    needs: backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Copy artifacts to deployment location
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\core\copy-artifacts.ps1

      - name: Install dependencies
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\core\install-dependencies.ps1

  deploy:
    name: Deploy Services
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment }}
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy database schema
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\core\deploy-database.ps1

      - name: Configure API service
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          .\deployment\scripts\core\configure-service.ps1 -Component api

      - name: Start API service
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\core\start-service.ps1 -Component api

  validate:
    name: Validate Deployment
    runs-on: ${{ fromJSON(inputs.runner_labels) }}
    environment: ${{ inputs.environment }}
    needs: deploy
    if: ${{ !inputs.skip_validation }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Run validation tests
        shell: pwsh
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\validation\validate-deployment.ps1

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [backup, build, deploy, validate]
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.sha }}

      - name: Create summary
        shell: pwsh
        run: |
          .\deployment\scripts\reporting\create-summary.ps1 `
            -Environment "${{ inputs.environment }}" `
            -GitRef "${{ inputs.git_ref || github.sha }}" `
            -Actor "${{ github.actor }}"
