name: CD - Deploy to Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production
      git_ref:
        description: 'Git ref (tag, branch, or SHA) to deploy'
        required: true
        type: string
      skip_tests:
        description: 'Skip validation tests'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  preflight:
    name: Preflight Checks - ${{ inputs.environment }}
    runs-on: ${{ inputs.environment == 'development' && fromJSON('["self-hosted", "windows", "HART-DESKTOP"]') || fromJSON('["self-hosted", "linux", "hart-server"]') }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code at ${{ inputs.git_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run preflight checks (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        env:
          LOG_LEVEL: INFO
        run: |
          .\deployment\scripts\preflight\check-prerequisites.ps1

      - name: Run preflight checks (Linux)
        if: inputs.environment != 'development'
        shell: bash
        env:
          LOG_LEVEL: INFO
        run: |
          chmod +x ./deployment/scripts/preflight/check-prerequisites.sh
          ./deployment/scripts/preflight/check-prerequisites.sh

      - name: Validate secrets (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        env:
          LOG_LEVEL: INFO
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          .\deployment\scripts\preflight\validate-secrets.ps1

      - name: Validate secrets (Linux)
        if: inputs.environment != 'development'
        shell: bash
        env:
          LOG_LEVEL: INFO
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/preflight/validate-secrets.sh
          ./deployment/scripts/preflight/validate-secrets.sh

  deploy-database:
    name: Deploy Database - ${{ inputs.environment }}
    needs: preflight
    runs-on: ${{ inputs.environment == 'development' && fromJSON('["self-hosted", "windows", "HART-DESKTOP"]') || fromJSON('["self-hosted", "linux", "hart-server"]') }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code at ${{ inputs.git_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy schema (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          .\deployment\scripts\database\deploy-schema.ps1

      - name: Deploy schema (Linux)
        if: inputs.environment != 'development'
        shell: bash
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
        run: |
          chmod +x ./deployment/scripts/database/deploy-schema.sh
          ./deployment/scripts/database/deploy-schema.sh

  deploy-application:
    name: Deploy Application - ${{ inputs.environment }}
    needs: deploy-database
    runs-on: ${{ inputs.environment == 'development' && fromJSON('["self-hosted", "windows", "HART-DESKTOP"]') || fromJSON('["self-hosted", "linux", "hart-server"]') }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code at ${{ inputs.git_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy API (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          .\deployment\scripts\application\deploy-api.ps1

      - name: Deploy API (Linux)
        if: inputs.environment != 'development'
        shell: bash
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/application/deploy-api.sh
          ./deployment/scripts/application/deploy-api.sh

      - name: Deploy Neo4j Worker (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          .\deployment\scripts\neo4j\deploy-neo4j-worker.ps1

      - name: Deploy Neo4j Worker (Linux)
        if: inputs.environment != 'development'
        shell: bash
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ inputs.environment }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/neo4j/deploy-neo4j-worker.sh
          ./deployment/scripts/neo4j/deploy-neo4j-worker.sh

  validate:
    name: Validate Deployment - ${{ inputs.environment }}
    needs: deploy-application
    runs-on: ${{ inputs.environment == 'development' && fromJSON('["self-hosted", "windows", "HART-DESKTOP"]') || fromJSON('["self-hosted", "linux", "hart-server"]') }}
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout code at ${{ inputs.git_ref }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Health check (Windows)
        if: inputs.environment == 'development'
        shell: pwsh
        run: |
          .\deployment\scripts\validation\health-check.ps1

      - name: Health check (Linux)
        if: inputs.environment != 'development'
        shell: bash
        run: |
          chmod +x ./deployment/scripts/validation/health-check.sh
          ./deployment/scripts/validation/health-check.sh

      - name: Smoke tests (Windows)
        if: inputs.environment == 'development' && !inputs.skip_tests
        shell: pwsh
        run: |
          .\deployment\scripts\validation\smoke-test.ps1

      - name: Smoke tests (Linux)
        if: inputs.environment != 'development' && !inputs.skip_tests
        shell: bash
        run: |
          chmod +x ./deployment/scripts/validation/smoke-test.sh
          ./deployment/scripts/validation/smoke-test.sh

      - name: Create deployment summary
        shell: bash
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "? Deployed to **${{ inputs.environment }}** environment" >> $GITHUB_STEP_SUMMARY
          echo "- Git Ref: \`${{ inputs.git_ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
