name: Community - PR Management

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  welcome-first-pr:
    name: Welcome First-Time Contributors
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if first PR
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.pull_request.user.login;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: creator
            });

            if (prs.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `🎉 Welcome @${creator}!

            Thank you for your first pull request to Hartonomous!

            ### Next Steps:
            - ✅ All CI checks must pass
            - ✅ Code review by a maintainer
            - ✅ Address any feedback
            - ✅ Squash commits before merge

            ### Tips for Success:
            - Keep PRs focused on a single feature/fix
            - Write clear commit messages
            - Add tests for new functionality
            - Update documentation as needed

            We appreciate your contribution! 🙏`
              });
            }

  auto-label-pr:
    name: Auto-label PR by Size
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;

            let sizeLabel = '';
            if (total < 10) sizeLabel = 'size/XS';
            else if (total < 100) sizeLabel = 'size/S';
            else if (total < 500) sizeLabel = 'size/M';
            else if (total < 1000) sizeLabel = 'size/L';
            else sizeLabel = 'size/XL';

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel]
            });

  auto-assign-reviewers:
    name: Auto-assign Reviewers
    if: github.event.action == 'ready_for_review'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Assign reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const reviewers = ['AHartTN']; // Add team members

            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              reviewers: reviewers
            });

  check-conventional-commits:
    name: Check Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v5
        with:
          configFile: .commitlintrc.json
