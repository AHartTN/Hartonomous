name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy to environment'
        required: true
        type: choice
        options:
          - development
          - staging

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ahartn/hartonomous

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      
      - name: Install dependencies
        run: pip install -r api/requirements.txt && pip install pylint bandit safety
      
      - name: Lint & Security Scan
        run: |
          pylint api/ --exit-zero
          bandit -r api/ -f json -o bandit-report.json
          safety check --json > safety-report.json
        continue-on-error: true
      
      - name: Run Tests
        run: pytest api/tests/test_sanity.py -v --cov=api
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=ref,event=branch
      
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        environment: [development, staging]
    environment:
      name: ${{ matrix.environment }}
      url: ${{ vars.DEPLOYMENT_URL }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Install Azure Arc Extension
        run: az extension add --name connectedmachine --allow-preview true --yes
      
      - name: Deploy to ${{ matrix.environment }}
        run: |
          IMAGE_TAG="${{ needs.build.outputs.image-tag }}"
          echo "Deploying $IMAGE_TAG to ${{ matrix.environment }} (${{ vars.ARC_MACHINE_NAME }})"
          
          if [ "${{ vars.OS_TYPE }}" == "linux" ]; then
            SCRIPT="set -e; docker pull $IMAGE_TAG; docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e DATABASE_URL='${{ secrets.DATABASE_URL }}' -e LOG_LEVEL=${{ vars.LOG_LEVEL }} $IMAGE_TAG; docker ps | grep ${{ vars.CONTAINER_NAME }}"
          else
            SCRIPT="docker pull $IMAGE_TAG; docker stop ${{ vars.CONTAINER_NAME }} 2>\`$null; docker rm ${{ vars.CONTAINER_NAME }} 2>\`$null; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e DATABASE_URL='${{ secrets.DATABASE_URL }}' -e LOG_LEVEL=${{ vars.LOG_LEVEL }} $IMAGE_TAG; docker ps"
          fi
          
          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ matrix.environment }}-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 180
      
      - name: Verify Deployment
        run: |
          sleep 15
          az connectedmachine run-command show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ matrix.environment }}-${{ github.run_id }} \
            --query "instanceView.{state:executionState,output:output}" \
            --output table
