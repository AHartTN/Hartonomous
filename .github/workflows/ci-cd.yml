name: CI/CD Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pylint bandit safety
      
      - name: Lint Python code
        run: pylint api/ --exit-zero
        continue-on-error: true
      
      - name: Security scan with Bandit
        run: bandit -r api/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Check dependency vulnerabilities
        run: safety check --json > safety-report.json
        continue-on-error: true
      
      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
      
      - name: Run unit tests
        run: pytest api/tests/test_sanity.py -v --cov=api --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unit
          name: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: ghcr.io/ahartn/hartonomous:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image built successfully
        run: |
          echo "Docker image built successfully"
          echo "To push to GHCR, configure package permissions in GitHub settings"
          echo "Image tag: ghcr.io/ahartn/hartonomous:${{ github.ref_name }}"

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate, test-unit, build]
    if: always()
    
    steps:
      - name: Pipeline results
        run: |
          echo "==================================="
          echo "CI/CD Pipeline Completed"
          echo "==================================="
          echo "Validation: ${{ needs.validate.result }}"
          echo "Unit Tests: ${{ needs.test-unit.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "==================================="
          
          if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.test-unit.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "All checks passed!"
            exit 0
          else
            echo "Some checks failed"
            exit 1
          fi
