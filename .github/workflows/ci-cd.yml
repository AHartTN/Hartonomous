name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: |
            api/
            docker/
            alembic/
            alembic.ini
          retention-days: 7

  deploy-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: source-code
          path: source
      
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - run: az extension add --name connectedmachine --allow-preview true --yes
      
      - name: Deploy to Development
        run: |
          cd source
          tar -czf ../deploy.tar.gz .
          base64 -w 0 ../deploy.tar.gz > ../deploy.b64
          
          if [ "${{ vars.OS_TYPE }}" == "windows" ]; then
            SCRIPT='cd C:\temp; if (Test-Path deploy) { Remove-Item -Recurse -Force deploy }; mkdir deploy; cd deploy; Invoke-WebRequest -Uri https://github.com/AHartTN/Hartonomous/archive/${{ github.sha }}.tar.gz -OutFile code.tar.gz; tar -xzf code.tar.gz --strip-components=1; docker build -t ${{ vars.CONTAINER_NAME }}:${{ github.sha }} -f docker/Dockerfile .; docker stop ${{ vars.CONTAINER_NAME }} 2>$null; docker rm ${{ vars.CONTAINER_NAME }} 2>$null; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} ${{ vars.CONTAINER_NAME }}:${{ github.sha }}; docker ps'
          else
            SCRIPT='cd /tmp; rm -rf deploy; mkdir deploy; cd deploy; curl -sL https://github.com/AHartTN/Hartonomous/archive/${{ github.sha }}.tar.gz | tar -xz --strip-components=1; docker build -t ${{ vars.CONTAINER_NAME }}:${{ github.sha }} -f docker/Dockerfile .; docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} ${{ vars.CONTAINER_NAME }}:${{ github.sha }}; docker ps | grep ${{ vars.CONTAINER_NAME }}'
          fi
          
          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-dev-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 300

  deploy-staging:
    name: Deploy to Staging  
    runs-on: ubuntu-latest
    needs: [deploy-development]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - run: az extension add --name connectedmachine --allow-preview true --yes
      
      - name: Deploy to Staging
        run: |
          if [ "${{ vars.OS_TYPE }}" == "windows" ]; then
            SCRIPT='cd C:\temp; if (Test-Path deploy) { Remove-Item -Recurse -Force deploy }; mkdir deploy; cd deploy; Invoke-WebRequest -Uri https://github.com/AHartTN/Hartonomous/archive/${{ github.sha }}.tar.gz -OutFile code.tar.gz; tar -xzf code.tar.gz --strip-components=1; docker build -t ${{ vars.CONTAINER_NAME }}:${{ github.sha }} -f docker/Dockerfile .; docker stop ${{ vars.CONTAINER_NAME }} 2>$null; docker rm ${{ vars.CONTAINER_NAME }} 2>$null; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} ${{ vars.CONTAINER_NAME }}:${{ github.sha }}; docker ps'
          else
            SCRIPT='cd /tmp; rm -rf deploy; mkdir deploy; cd deploy; curl -sL https://github.com/AHartTN/Hartonomous/archive/${{ github.sha }}.tar.gz | tar -xz --strip-components=1; docker build -t ${{ vars.CONTAINER_NAME }}:${{ github.sha }} -f docker/Dockerfile .; docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} ${{ vars.CONTAINER_NAME }}:${{ github.sha }}; docker ps | grep ${{ vars.CONTAINER_NAME }}'
          fi
          
          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-staging-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 300
