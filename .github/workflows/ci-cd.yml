name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-api
  ATOMIZER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-code-atomizer

jobs:
  test-api:
    name: Test Python API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Match Dockerfile
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest api/tests/

  test-atomizer:
    name: Test C# Atomizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Assuming .NET 8
      - name: Restore dependencies
        run: dotnet restore src/Hartonomous.CodeAtomizer.Api
      - name: Build
        run: dotnet build --no-restore src/Hartonomous.CodeAtomizer.Api
      - name: Test
        run: dotnet test --no-build --verbosity normal src/Hartonomous.CodeAtomizer.Api

  build-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    needs: [test-api]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-atomizer:
    name: Build and Push Atomizer Image
    runs-on: ubuntu-latest
    needs: [test-atomizer]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ATOMIZER_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push Atomizer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Hartonomous.CodeAtomizer.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_dev:
    name: Deploy to development
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer]
    environment:
      name: development
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deployment logic needs to be updated for microservices."
          echo "API Image: ${{ needs.build-api.outputs.image_tag }}"
          echo "Atomizer Image: ${{ needs.build-atomizer.outputs.image_tag }}"
          # This script would now need to update a docker-compose file on the target
          # and run 'docker-compose up -d' instead of a single 'docker run'.
          # For now, this is a placeholder.
          
  deploy_staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_dev]
    environment:
      name: staging
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deployment logic needs to be updated for microservices."

  deploy_production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_staging]
    environment:
      name: production
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deployment logic needs to be updated for microservices."
