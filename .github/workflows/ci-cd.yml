name: CI/CD Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch:
    inputs:
      target_machine:
        description: 'Target deployment machine'
        required: true
        type: choice
        options:
          - hart-server
          - HART-DESKTOP
          - both

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  AZURE_SUBSCRIPTION_ID: ed614e1a-7d8b-4608-90c8-66e86c37080b
  AZURE_RESOURCE_GROUP: rg-hartonomous
  AZURE_TENANT_ID: 6c9c44c4-f04b-4b5f-bea0-f1069179799c

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pylint bandit safety
      
      - name: Lint Python code
        run: pylint api/ --exit-zero
        continue-on-error: true
      
      - name: Security scan with Bandit
        run: bandit -r api/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Check dependency vulnerabilities
        run: safety check --json > safety-report.json
        continue-on-error: true
      
      - name: Upload security scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-results
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
      
      - name: Run unit tests
        run: pytest api/tests/test_sanity.py -v --cov=api --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: ${{ github.workspace }}
      
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unit
          name: unit-tests
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: ghcr.io/ahartn/hartonomous:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Image built successfully
        run: |
          echo "Docker image built successfully"
          echo "To push to GHCR, configure package permissions in GitHub settings"
          echo "Image tag: ghcr.io/ahartn/hartonomous:${{ github.ref_name }}"

  deploy-linux:
    name: Deploy to hart-server (Linux)
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      (github.ref == 'refs/heads/develop' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target_machine == 'hart-server' || github.event.inputs.target_machine == 'both'))
    timeout-minutes: 15
    environment:
      name: hart-server
      url: http://hart-server:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to hart-server via Azure Arc
        run: |
          echo "Deploying to hart-server (Linux/Docker)"
          
          az connectedmachine run-command create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --machine-name hart-server \
            --run-command-name deploy-hartonomous-${{ github.run_id }} \
            --script "
              set -e
              echo 'Pulling latest Docker image...'
              docker pull ghcr.io/ahartn/hartonomous:${{ github.ref_name }} || echo 'Image pull skipped (not published to GHCR yet)'
              
              echo 'Stopping existing container...'
              docker stop hartonomous-api || true
              docker rm hartonomous-api || true
              
              echo 'Starting new container...'
              docker run -d \
                --name hartonomous-api \
                --restart unless-stopped \
                --network bridge \
                -p 8000:8000 \
                -e DATABASE_URL='postgresql://hartonomous:\${PGPASSWORD}@localhost:5432/hartonomous' \
                -e NEO4J_URI='bolt://localhost:7687' \
                -e NEO4J_ENABLED=true \
                -e AUTH_ENABLED=false \
                -e LOG_LEVEL=INFO \
                ghcr.io/ahartn/hartonomous:${{ github.ref_name }} || echo 'Container start skipped (image not available)'
              
              echo 'Deployment complete'
              docker ps | grep hartonomous || echo 'Container not running yet'
            " \
            --timeout-in-seconds 120
          
          echo "Deployment command sent to hart-server"
      
      - name: Check deployment status
        run: |
          sleep 10
          az connectedmachine run-command show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --machine-name hart-server \
            --run-command-name deploy-hartonomous-${{ github.run_id }} \
            --query "instanceView.{status:executionState,output:output,error:error}" \
            --output table

  deploy-windows:
    name: Deploy to HART-DESKTOP (Windows)
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target_machine == 'HART-DESKTOP' || github.event.inputs.target_machine == 'both'))
    timeout-minutes: 15
    environment:
      name: HART-DESKTOP
      url: http://HART-DESKTOP:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to HART-DESKTOP via Azure Arc
        run: |
          echo "Deploying to HART-DESKTOP (Windows/Docker)"
          
          az connectedmachine run-command create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --machine-name HART-DESKTOP \
            --run-command-name deploy-hartonomous-${{ github.run_id }} \
            --script "
              Write-Host 'Pulling latest Docker image...'
              docker pull ghcr.io/ahartn/hartonomous:${{ github.ref_name }}
              
              Write-Host 'Stopping existing container...'
              docker stop hartonomous-api 2>\$null
              docker rm hartonomous-api 2>\$null
              
              Write-Host 'Starting new container...'
              docker run -d \`
                --name hartonomous-api \`
                --restart unless-stopped \`
                -p 8000:8000 \`
                -e DATABASE_URL='postgresql://hartonomous:\$env:PGPASSWORD@localhost:5432/hartonomous' \`
                -e NEO4J_URI='bolt://localhost:7687' \`
                -e NEO4J_ENABLED=true \`
                -e AUTH_ENABLED=false \`
                -e LOG_LEVEL=INFO \`
                ghcr.io/ahartn/hartonomous:${{ github.ref_name }}
              
              Write-Host 'Deployment complete'
              docker ps | Select-String hartonomous
            " \
            --timeout-in-seconds 120
          
          echo "Deployment command sent to HART-DESKTOP"
      
      - name: Check deployment status
        run: |
          sleep 10
          az connectedmachine run-command show \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --machine-name HART-DESKTOP \
            --run-command-name deploy-hartonomous-${{ github.run_id }} \
            --query "instanceView.{status:executionState,output:output,error:error}" \
            --output table

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [validate, test-unit, build, deploy-linux, deploy-windows]
    if: always()
    
    steps:
      - name: Pipeline results
        run: |
          echo "=========================================="
          echo "CI/CD Pipeline Completed"
          echo "=========================================="
          echo "Validation:      ${{ needs.validate.result }}"
          echo "Unit Tests:      ${{ needs.test-unit.result }}"
          echo "Build:           ${{ needs.build.result }}"
          echo "Deploy (Linux):  ${{ needs.deploy-linux.result }}"
          echo "Deploy (Windows): ${{ needs.deploy-windows.result }}"
          echo "=========================================="
          
          if [[ "${{ needs.validate.result }}" == "success" && "${{ needs.test-unit.result }}" == "success" && "${{ needs.build.result }}" == "success" ]]; then
            echo "All required checks passed!"
            exit 0
          else
            echo "Some checks failed"
            exit 1
          fi
