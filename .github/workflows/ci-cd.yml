name: CI/CD Pipeline

on:
  push:
    branches: [develop, staging, main]
  pull_request:
    branches: [develop, staging, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - development
          - staging
          - production

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pylint bandit safety
      
      - name: Lint Python code
        run: pylint api/ --exit-zero
        continue-on-error: true
      
      - name: Security scan with Bandit
        run: bandit -r api/ -f json -o bandit-report.json
        continue-on-error: true
      
      - name: Check dependency vulnerabilities
        run: safety check --json > safety-report.json
        continue-on-error: true

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r api/requirements.txt
      
      - name: Run unit tests
        run: pytest api/tests/test_sanity.py -v --cov=api --cov-report=xml
        env:
          PYTHONPATH: ${{ github.workspace }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: ghcr.io/ahartn/hartonomous:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    environment:
      name: development
      url: http://hart-server:8000
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Install Azure Arc extension
        run: az extension add --name connectedmachine --yes
      
      - name: Deploy via Azure Arc
        run: |
          echo "Deploying to Development Environment"
          echo "Machine: ${{ vars.ARC_MACHINE_NAME }}"
          
          SCRIPT="set -e; docker pull ${{ vars.DOCKER_IMAGE }}:develop || echo 'Image skip'; docker stop ${{ vars.CONTAINER_NAME }} || true; docker rm ${{ vars.CONTAINER_NAME }} || true; docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} ${{ vars.DOCKER_IMAGE }}:develop || echo 'Deploy skip'; docker ps"
          
          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 120
      
      - name: Check deployment
        run: |
          sleep 10
          az connectedmachine run-command show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ github.run_id }} \
            --query "instanceView.executionState"
