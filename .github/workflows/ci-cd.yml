name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ahartn/hartonomous

jobs:
  build_and_push:
    name: Build and Push Image (versioned)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tag
        run: echo "IMAGE_TAG=${{ steps.meta.outputs.tags }}"

  deploy_dev:
    name: Deploy to development (same version)
    runs-on: ubuntu-latest
    needs: [build_and_push]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: development
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Arc extension
        run: az extension add --name connectedmachine --allow-preview true --yes

      - name: Deploy
        run: |
          IMAGE_TAG="${{ needs.build_and_push.outputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then echo "Missing image tag"; exit 1; fi

          if [ "${{ vars.OS_TYPE }}" = "windows" ]; then
            SCRIPT='
            docker logout
            docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USERNAME }} -p ${{ secrets.GHCR_TOKEN }}
            docker pull '"$IMAGE_TAG"'
            docker stop ${{ vars.CONTAINER_NAME }} 2>$null
            docker rm ${{ vars.CONTAINER_NAME }} 2>$null
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} '"$IMAGE_TAG"'
            '
          else
            SCRIPT='
            set -e
            echo ${{ secrets.GHCR_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            docker pull '"$IMAGE_TAG"'
            docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} '"$IMAGE_TAG"'
            '
          fi

          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-dev-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 300

      - name: Verify dev health
        run: |
          if [ "${{ vars.OS_TYPE }}" = "windows" ]; then
            VERIFY='Invoke-WebRequest -UseBasicParsing http://localhost:${{ vars.API_PORT }}/health -TimeoutSec 10 | Select-Object -ExpandProperty Content'
          else
            VERIFY='curl -sf http://localhost:${{ vars.API_PORT }}/health || curl -sf http://127.0.0.1:${{ vars.API_PORT }}/health'
          fi

          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name verify-dev-${{ github.run_id }} \
            --script "$VERIFY" \
            --timeout-in-seconds 60

          az connectedmachine run-command show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name verify-dev-${{ github.run_id }} \
            --query "instanceView.output" -o tsv

  deploy_staging:
    name: Deploy to staging (promote same version)
    runs-on: ubuntu-latest
    needs: [deploy_dev]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Arc extension
        run: az extension add --name connectedmachine --allow-preview true --yes

      - name: Deploy
        run: |
          IMAGE_TAG="${{ needs.build_and_push.outputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then echo "Missing image tag"; exit 1; fi

          if [ "${{ vars.OS_TYPE }}" = "windows" ]; then
            SCRIPT='
            docker logout
            docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USERNAME }} -p ${{ secrets.GHCR_TOKEN }}
            docker pull '"$IMAGE_TAG"'
            docker stop ${{ vars.CONTAINER_NAME }} 2>$null
            docker rm ${{ vars.CONTAINER_NAME }} 2>$null
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} '"$IMAGE_TAG"'
            '
          else
            SCRIPT='
            set -e
            echo ${{ secrets.GHCR_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USERNAME }} --password-stdin
            docker pull '"$IMAGE_TAG"'
            docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} '"$IMAGE_TAG"'
            '
          fi

          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-staging-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 300

      - name: Verify staging health
        run: |
          if [ "${{ vars.OS_TYPE }}" = "windows" ]; then
            VERIFY='Invoke-WebRequest -UseBasicParsing http://localhost:${{ vars.API_PORT }}/health -TimeoutSec 10 | Select-Object -ExpandProperty Content'
          else
            VERIFY='curl -sf http://localhost:${{ vars.API_PORT }}/health || curl -sf http://127.0.0.1:${{ vars.API_PORT }}/health'
          fi

          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name verify-staging-${{ github.run_id }} \
            --script "$VERIFY" \
            --timeout-in-seconds 60

          az connectedmachine run-command show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name verify-staging-${{ github.run_id }} \
            --query "instanceView.output" -o tsv
