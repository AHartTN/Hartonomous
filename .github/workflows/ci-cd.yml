name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  test:
    name: Test Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: api/requirements.txt
      
      - run: |
          pip install -r api/requirements.txt
          pip install pylint bandit safety pytest pytest-cov
      
      - run: pylint api/ --exit-zero
        continue-on-error: true
      
      - run: bandit -r api/ -f json -o bandit-report.json
        continue-on-error: true
      
      - run: safety check --json > safety-report.json || true
        continue-on-error: true
      
      - run: pytest api/tests/test_sanity.py -v --cov=api
        env:
          PYTHONPATH: ${{ github.workspace }}

  deploy:
    name: Deploy to ${{ matrix.environment }}
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/develop'
    strategy:
      matrix:
        environment: [development, staging]
    environment:
      name: ${{ matrix.environment }}
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - run: az extension add --name connectedmachine --allow-preview true --yes
      
      - name: Build and Deploy on Arc Machine
        run: |
          # Create deployment script based on OS
          if [ "${{ vars.OS_TYPE }}" == "windows" ]; then
            SCRIPT='
            cd C:\temp
            if (Test-Path hartonomous) { Remove-Item -Recurse -Force hartonomous }
            git clone --depth 1 --branch develop https://github.com/AHartTN/Hartonomous hartonomous
            cd hartonomous
            docker build -t hartonomous:${{ github.sha }} -f docker/Dockerfile .
            docker stop ${{ vars.CONTAINER_NAME }} 2>$null
            docker rm ${{ vars.CONTAINER_NAME }} 2>$null
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} hartonomous:${{ github.sha }}
            docker ps
            '
          else
            SCRIPT='
            cd /tmp
            rm -rf hartonomous
            git clone --depth 1 --branch develop https://github.com/AHartTN/Hartonomous hartonomous
            cd hartonomous
            docker build -t hartonomous:${{ github.sha }} -f docker/Dockerfile .
            docker stop ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ vars.CONTAINER_NAME }} 2>/dev/null || true
            docker run -d --name ${{ vars.CONTAINER_NAME }} --restart unless-stopped -p ${{ vars.API_PORT }}:8000 -e LOG_LEVEL=${{ vars.LOG_LEVEL }} hartonomous:${{ github.sha }}
            docker ps | grep ${{ vars.CONTAINER_NAME }}
            '
          fi
          
          az connectedmachine run-command create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ github.run_id }} \
            --script "$SCRIPT" \
            --timeout-in-seconds 300
      
      - name: Verify Deployment
        run: |
          sleep 20
          az connectedmachine run-command show \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --machine-name ${{ vars.ARC_MACHINE_NAME }} \
            --run-command-name deploy-${{ github.run_id }} \
            --query "instanceView.{state:executionState,exitCode:exitCode,output:output}" \
            -o table
