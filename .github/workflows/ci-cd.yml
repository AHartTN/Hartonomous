name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-api
  ATOMIZER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-code-atomizer

jobs:
  test-api:
    name: Test Python API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: ${{ secrets.TEST_POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.TEST_POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5.15
        env:
          NEO4J_AUTH: ${{ secrets.TEST_NEO4J_USER }}/${{ secrets.TEST_NEO4J_PASSWORD }}
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql-client
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Initialize database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: ${{ secrets.TEST_POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          PGDATABASE: ${{ secrets.TEST_POSTGRES_DB }}
        run: |
          # Install extensions
          psql -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
          psql -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"
          psql -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          
          # Create core tables
          psql -f schema/core/tables/001_atom.sql
          psql -f schema/core/tables/002_atom_composition.sql
          psql -f schema/core/tables/003_atom_relation.sql
          
          # Create spatial functions
          for f in schema/core/functions/spatial/*.sql; do psql -f "$f"; done
          
          # Create atomization functions
          for f in schema/core/functions/atomization/*.sql; do psql -f "$f"; done
          
          # Create composition functions
          for f in schema/core/functions/composition/*.sql; do psql -f "$f"; done
          
          # Create relation functions
          for f in schema/core/functions/relations/*.sql; do psql -f "$f"; done
          
          # Create indexes
          for f in schema/core/indexes/spatial/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/core/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/composition/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/relations/*.sql; do psql -f "$f"; done
          
          # Create triggers
          psql -f schema/core/triggers/001_temporal_versioning.sql
          psql -f schema/core/triggers/002_reference_counting.sql
          psql -f schema/core/triggers/004_spatial_hilbert.sql
      
      - name: Run tests
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: ${{ secrets.TEST_POSTGRES_USER }}
          PGPASSWORD: ${{ secrets.TEST_POSTGRES_PASSWORD }}
          PGDATABASE: ${{ secrets.TEST_POSTGRES_DB }}
          PGSSLMODE: prefer
          NEO4J_ENABLED: true
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: ${{ secrets.TEST_NEO4J_USER }}
          NEO4J_PASSWORD: ${{ secrets.TEST_NEO4J_PASSWORD }}
          NEO4J_DATABASE: neo4j
          USE_AZURE_CONFIG: false
          AUTH_ENABLED: false
          API_HOST: 127.0.0.1
          API_PORT: 8000
          LOG_LEVEL: INFO
          CODE_ATOMIZER_URL: http://localhost:8001
          POOL_MIN_SIZE: 2
          POOL_MAX_SIZE: 5
        run: |
          pytest api/tests/ -v --tb=short

  test-atomizer:
    name: Test C# Atomizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore src/Hartonomous.CodeAtomizer.Api
      - name: Build
        run: dotnet build --no-restore src/Hartonomous.CodeAtomizer.Api
      - name: Test
        run: dotnet test --no-build --verbosity normal src/Hartonomous.CodeAtomizer.Api

  build-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    needs: [test-api]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-atomizer:
    name: Build and Push Atomizer Image
    runs-on: ubuntu-latest
    needs: [test-atomizer]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ATOMIZER_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push Atomizer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Hartonomous.CodeAtomizer.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_dev:
    name: Deploy to development
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer]
    environment:
      name: development
      url: ${{ vars.DEV_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to hart-server via Azure Arc
        env:
          MACHINE_NAME: hart-server
          RESOURCE_GROUP: rg-hartonomous
          API_IMAGE: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          ATOMIZER_IMAGE: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          KEY_VAULT_NAME: kv-hartonomous
        run: |
          # Create deployment script
          cat > deploy-dev.sh << 'EOFSCRIPT'
          #!/bin/bash
          set -e
          
          # Get secrets from Key Vault using Managed Identity
          export PGPASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name PostgreSQL-hart-server-hartonomous-Password --query value -o tsv)
          export NEO4J_PASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name Neo4j--Password --query value -o tsv)
          
          # Navigate to deployment directory
          cd /opt/hartonomous || { echo "Deployment directory not found"; exit 1; }
          
          # Pull latest images from GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker pull ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          
          # Create/update docker-compose.override.yml with image tags
          cat > docker-compose.override.yml << EOF
          services:
            api:
              image: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
              environment:
                - USE_AZURE_CONFIG=true
                - KEY_VAULT_URL=https://kv-hartonomous.vault.azure.net/
                - APP_CONFIG_ENDPOINT=https://appconfig-hartonomous.azconfig.io
                - PGPASSWORD=\${PGPASSWORD}
                - NEO4J_PASSWORD=\${NEO4J_PASSWORD}
            
            code-atomizer:
              image: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          EOF
          
          # Deploy with zero downtime
          docker-compose up -d --no-build
          
          # Wait for health checks
          echo "Waiting for services to become healthy..."
          sleep 15
          
          # Verify deployment
          if docker-compose ps | grep -q "unhealthy"; then
            echo "Health check failed!"
            docker-compose logs --tail=50
            exit 1
          fi
          
          echo "Deployment successful"
          docker-compose ps
          EOFSCRIPT
          
          # Execute deployment via Azure Arc run-command
          az connectedmachine run-command create \
            --name "deploy-dev-${{ github.run_id }}" \
            --machine-name "$MACHINE_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --script "@deploy-dev.sh" \
            --timeout-in-seconds 300
      
      - name: Verify deployment
        run: |
          # Wait for run-command to complete
          az connectedmachine run-command wait \
            --name "deploy-dev-${{ github.run_id }}" \
            --machine-name hart-server \
            --resource-group rg-hartonomous \
            --created \
            --timeout 300
          
          # Get execution results
          RESULT=$(az connectedmachine run-command show \
            --name "deploy-dev-${{ github.run_id }}" \
            --machine-name hart-server \
            --resource-group rg-hartonomous \
            --query "instanceView.executionState" -o tsv)
          
          if [ "$RESULT" != "Succeeded" ]; then
            echo "Deployment failed with state: $RESULT"
            az connectedmachine run-command show \
              --name "deploy-dev-${{ github.run_id }}" \
              --machine-name hart-server \
              --resource-group rg-hartonomous \
              --query "instanceView.{output:output, error:error}"
            exit 1
          fi
          
          echo "Development deployment verified successfully"
          
  deploy_staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_dev]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Deploy to HART-DESKTOP via Azure Arc
        env:
          MACHINE_NAME: HART-DESKTOP
          RESOURCE_GROUP: rg-hartonomous
          API_IMAGE: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          ATOMIZER_IMAGE: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
        run: |
          cat > deploy-staging.sh << 'EOFSCRIPT'
          #!/bin/bash
          set -e
          
          # Get secrets from Key Vault
          export PGPASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name PostgreSQL-HART-DESKTOP-hartonomous-Password --query value -o tsv)
          export NEO4J_PASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name Neo4j--Password --query value -o tsv)
          
          cd /opt/hartonomous-staging || { echo "Staging directory not found"; exit 1; }
          
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker pull ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          
          cat > docker-compose.override.yml << EOF
          services:
            api:
              image: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
              environment:
                - USE_AZURE_CONFIG=true
                - KEY_VAULT_URL=https://kv-hartonomous.vault.azure.net/
                - APP_CONFIG_ENDPOINT=https://appconfig-hartonomous.azconfig.io
                - PGPASSWORD=\${PGPASSWORD}
                - NEO4J_PASSWORD=\${NEO4J_PASSWORD}
            
            code-atomizer:
              image: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          EOF
          
          docker-compose up -d --no-build
          sleep 15
          
          if docker-compose ps | grep -q "unhealthy"; then
            echo "Health check failed!"
            docker-compose logs --tail=50
            exit 1
          fi
          
          echo "Staging deployment successful"
          docker-compose ps
          EOFSCRIPT
          
          az connectedmachine run-command create \
            --name "deploy-staging-${{ github.run_id }}" \
            --machine-name "$MACHINE_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --script "@deploy-staging.sh" \
            --timeout-in-seconds 300
      
      - name: Verify deployment
        run: |
          az connectedmachine run-command wait \
            --name "deploy-staging-${{ github.run_id }}" \
            --machine-name HART-DESKTOP \
            --resource-group rg-hartonomous \
            --created \
            --timeout 300
          
          RESULT=$(az connectedmachine run-command show \
            --name "deploy-staging-${{ github.run_id }}" \
            --machine-name HART-DESKTOP \
            --resource-group rg-hartonomous \
            --query "instanceView.executionState" -o tsv)
          
          if [ "$RESULT" != "Succeeded" ]; then
            echo "Staging deployment failed: $RESULT"
            az connectedmachine run-command show \
              --name "deploy-staging-${{ github.run_id }}" \
              --machine-name HART-DESKTOP \
              --resource-group rg-hartonomous \
              --query "instanceView.{output:output, error:error}"
            exit 1
          fi
          
          echo "Staging deployment verified"

  deploy_production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_staging]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Blue-Green deployment to production (HART-DESKTOP)
        env:
          MACHINE_NAME: HART-DESKTOP
          RESOURCE_GROUP: rg-hartonomous
          API_IMAGE: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          ATOMIZER_IMAGE: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
        run: |
          cat > deploy-production.sh << 'EOFSCRIPT'
          #!/bin/bash
          set -e
          
          # Get secrets
          export PGPASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name PostgreSQL-HART-DESKTOP-hartonomous-Password --query value -o tsv)
          export NEO4J_PASSWORD=$(az keyvault secret show --vault-name kv-hartonomous --name Neo4j--Password --query value -o tsv)
          
          # Production directory
          PROD_DIR="/opt/hartonomous-production"
          GREEN_DIR="${PROD_DIR}/green"
          BLUE_DIR="${PROD_DIR}/blue"
          ACTIVE_LINK="${PROD_DIR}/active"
          
          cd "$PROD_DIR" || { echo "Production directory not found"; exit 1; }
          
          # Determine current active slot
          if [ -L "$ACTIVE_LINK" ]; then
            CURRENT=$(readlink "$ACTIVE_LINK")
            if [ "$CURRENT" = "$BLUE_DIR" ]; then
              DEPLOY_TO="green"
              DEPLOY_DIR="$GREEN_DIR"
            else
              DEPLOY_TO="blue"
              DEPLOY_DIR="$BLUE_DIR"
            fi
          else
            # First deployment
            DEPLOY_TO="green"
            DEPLOY_DIR="$GREEN_DIR"
          fi
          
          echo "Deploying to $DEPLOY_TO slot..."
          
          # Prepare deployment slot
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          
          # Pull images
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
          docker pull ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
          
          # Create docker-compose for this slot
          cat > docker-compose.yml << EOF
          services:
            api:
              image: ${{ env.API_IMAGE_NAME }}:${{ github.sha }}
              container_name: hartonomous-api-${DEPLOY_TO}
              environment:
                - USE_AZURE_CONFIG=true
                - KEY_VAULT_URL=https://kv-hartonomous.vault.azure.net/
                - APP_CONFIG_ENDPOINT=https://appconfig-hartonomous.azconfig.io
                - PGPASSWORD=\${PGPASSWORD}
                - NEO4J_PASSWORD=\${NEO4J_PASSWORD}
              ports:
                - "8100:8000"  # Use different port for green/blue
              restart: unless-stopped
            
            code-atomizer:
              image: ${{ env.ATOMIZER_IMAGE_NAME }}:${{ github.sha }}
              container_name: hartonomous-atomizer-${DEPLOY_TO}
              ports:
                - "8101:8001"
              restart: unless-stopped
          EOF
          
          # Start green/blue slot
          docker-compose up -d
          sleep 20
          
          # Smoke tests
          if ! curl -f http://localhost:8100/health; then
            echo "Health check failed on $DEPLOY_TO slot!"
            docker-compose logs
            exit 1
          fi
          
          echo "$DEPLOY_TO slot healthy, swapping..."
          
          # Swap active slot
          ln -sfn "$DEPLOY_DIR" "$ACTIVE_LINK"
          
          # Update production nginx/caddy to point to new slot (port 8100)
          # ... proxy configuration update here ...
          
          echo "Production swap complete. Active slot: $DEPLOY_TO"
          
          # Optionally stop old slot after grace period
          # (Keep running for rollback capability)
          EOFSCRIPT
          
          az connectedmachine run-command create \
            --name "deploy-prod-${{ github.run_id }}" \
            --machine-name "$MACHINE_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --script "@deploy-production.sh" \
            --timeout-in-seconds 600
      
      - name: Verify production deployment
        run: |
          az connectedmachine run-command wait \
            --name "deploy-prod-${{ github.run_id }}" \
            --machine-name HART-DESKTOP \
            --resource-group rg-hartonomous \
            --created \
            --timeout 600
          
          RESULT=$(az connectedmachine run-command show \
            --name "deploy-prod-${{ github.run_id }}" \
            --machine-name HART-DESKTOP \
            --resource-group rg-hartonomous \
            --query "instanceView.executionState" -o tsv)
          
          if [ "$RESULT" != "Succeeded" ]; then
            echo "Production deployment failed: $RESULT"
            az connectedmachine run-command show \
              --name "deploy-prod-${{ github.run_id }}" \
            --machine-name HART-DESKTOP \
              --resource-group rg-hartonomous \
              --query "instanceView.{output:output, error:error}"
            exit 1
          fi
          
          echo "✅ Production deployment complete with blue-green swap"
