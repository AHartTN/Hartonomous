name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-api
  ATOMIZER_IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hartonomous-code-atomizer

jobs:
  test-api:
    name: Test Python API
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: hartonomous
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: hartonomous_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      neo4j:
        image: neo4j:5.15
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --quiet --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev postgresql-client
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Create test .env file
        run: |
          cat > .env << EOF
          # CI Test Environment
          PGHOST=localhost
          PGPORT=5432
          PGUSER=hartonomous
          PGPASSWORD=test_password
          PGDATABASE=hartonomous_test
          PGSSLMODE=prefer
          
          NEO4J_ENABLED=true
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testpassword
          NEO4J_DATABASE=neo4j
          
          USE_AZURE_CONFIG=false
          AUTH_ENABLED=false
          
          API_HOST=127.0.0.1
          API_PORT=8000
          LOG_LEVEL=INFO
          
          CODE_ATOMIZER_URL=http://localhost:8001
          
          POOL_MIN_SIZE=2
          POOL_MAX_SIZE=5
          EOF
      
      - name: Initialize database schema
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: hartonomous
          PGPASSWORD: test_password
          PGDATABASE: hartonomous_test
        run: |
          # Install extensions
          psql -c "CREATE EXTENSION IF NOT EXISTS postgis;"
          psql -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
          psql -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"
          psql -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          
          # Create core tables
          psql -f schema/core/tables/001_atom.sql
          psql -f schema/core/tables/002_atom_composition.sql
          psql -f schema/core/tables/003_atom_relation.sql
          
          # Create spatial functions
          for f in schema/core/functions/spatial/*.sql; do psql -f "$f"; done
          
          # Create atomization functions
          for f in schema/core/functions/atomization/*.sql; do psql -f "$f"; done
          
          # Create composition functions
          for f in schema/core/functions/composition/*.sql; do psql -f "$f"; done
          
          # Create relation functions
          for f in schema/core/functions/relations/*.sql; do psql -f "$f"; done
          
          # Create indexes
          for f in schema/core/indexes/spatial/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/core/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/composition/*.sql; do psql -f "$f"; done
          for f in schema/core/indexes/relations/*.sql; do psql -f "$f"; done
          
          # Create triggers
          psql -f schema/core/triggers/001_temporal_versioning.sql
          psql -f schema/core/triggers/002_reference_counting.sql
          psql -f schema/core/triggers/004_spatial_hilbert.sql
      
      - name: Run tests
        env:
          DATABASE_URL: postgresql://hartonomous:test_password@localhost:5432/hartonomous_test
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: hartonomous
          PGPASSWORD: test_password
          PGDATABASE: hartonomous_test
          NEO4J_ENABLED: true
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
        run: |
          pytest api/tests/ -v --tb=short

  test-atomizer:
    name: Test C# Atomizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore src/Hartonomous.CodeAtomizer.Api
      - name: Build
        run: dotnet build --no-restore src/Hartonomous.CodeAtomizer.Api
      - name: Test
        run: dotnet test --no-build --verbosity normal src/Hartonomous.CodeAtomizer.Api

  build-api:
    name: Build and Push API Image
    runs-on: ubuntu-latest
    needs: [test-api]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-atomizer:
    name: Build and Push Atomizer Image
    runs-on: ubuntu-latest
    needs: [test-atomizer]
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ATOMIZER_IMAGE_NAME }}
          tags: type=sha
      - name: Build and push Atomizer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Hartonomous.CodeAtomizer.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_dev:
    name: Deploy to development
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer]
    environment:
      name: development
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deploying to development environment"
          echo "API Image: ${{ needs.build-api.outputs.image_tag }}"
          echo "Atomizer Image: ${{ needs.build-atomizer.outputs.image_tag }}"
          # Idempotent deployment:
          # 1. Pull latest images
          # 2. Stop existing containers gracefully
          # 3. Start new containers with updated images
          # 4. Health check before marking deployment complete
          # Implementation would use Azure Container Instances or Azure Web App for Containers
          
  deploy_staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_dev]
    environment:
      name: staging
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deploying to staging environment"
          # Idempotent staging deployment with same pattern as dev

  deploy_production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-api, build-atomizer, deploy_staging]
    environment:
      name: production
      url: ${{ vars.DEPLOYMENT_URL }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Deploy services
        run: |
          echo "Deploying to production environment"
          # Idempotent production deployment:
          # 1. Blue/green deployment strategy
          # 2. Deploy to green slot
          # 3. Run smoke tests
          # 4. Swap slots if tests pass
          # 5. Keep blue slot for rollback
