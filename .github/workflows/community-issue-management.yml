name: Community - Issue Management

on:
  issues:
    types: [opened, labeled, assigned]
  issue_comment:
    types: [created]

jobs:
  auto-label-bug:
    name: Auto-label Bugs
    if: github.event.action == 'opened' && contains(github.event.issue.title, 'bug')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add bug label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['bug']
            });

  auto-label-feature:
    name: Auto-label Feature Requests
    if: github.event.action == 'opened' && contains(github.event.issue.title, 'feat')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Add feature label
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['feature-request']
            });

  welcome-first-issue:
    name: Welcome First-Time Contributors
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check if first issue
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'all'
            });

            if (issues.data.length === 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `👋 Welcome @${creator}!

            Thank you for opening your first issue in Hartonomous! We're excited to have you as part of our community.

            A maintainer will review your issue soon. In the meantime:
            - Make sure you've provided all relevant information
            - Check out our [Contributing Guide](../CONTRIBUTING.md)
            - Join our [Discord community](https://discord.gg/hartonomous) for discussions

            Looking forward to working with you!`
              });
            }

  stale-issue-check:
    name: Mark Stale Issues
    if: github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: 'This issue has been automatically marked as stale because it has not had recent activity. It will be closed if no further activity occurs within 7 days.'
          stale-issue-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
