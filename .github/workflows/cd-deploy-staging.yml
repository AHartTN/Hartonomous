name: CD - Deploy to Staging

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref (tag, branch, or SHA) to deploy'
        required: true
        type: string
        default: 'develop'

permissions:
  id-token: write
  contents: read
  actions: write

jobs:
  deploy:
    name: Deploy to Staging
    uses: ./.github/workflows/cd-deploy-environment.yml
    with:
      environment: staging
      git_ref: ${{ inputs.git_ref }}
      skip_tests: false
    secrets: inherit
