name: CD - Deploy to Production

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref (tag/SHA) to deploy - MUST be a release tag'
        required: true
        type: string
      skip_tests:
        description: 'Skip validation tests'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    environment:
      name: production-approval
      url: https://api.hartonomous.com
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Production deployment approved"
          echo "Git Ref: ${{ inputs.git_ref }}"

  deploy:
    name: Deploy to Production
    needs: approval
    uses: ./.github/workflows/cd-deploy-environment.yml
    with:
      environment: production
      git_ref: ${{ inputs.git_ref }}
      skip_tests: ${{ inputs.skip_tests }}
    secrets: inherit

  create-release:
    name: Create GitHub Release
    needs: deploy
    runs-on: ubuntu-latest
    if: startsWith(inputs.git_ref, 'v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.git_ref }}
          name: Release ${{ inputs.git_ref }}
          body: |
            ## 🚀 Production Release ${{ inputs.git_ref }}

            **Deployed to**: hart-server (Production)
            **Deployed by**: @${{ github.actor }}
            **Deployed at**: ${{ github.event.repository.updated_at }}

            ### Deployment Summary
            - ✅ Database migration successful
            - ✅ Application deployment successful
            - ✅ Neo4j worker deployment successful
            - ✅ Health checks passing
            ${{ !inputs.skip_tests && '- ✅ Smoke tests passing' || '- ⚠️ Smoke tests skipped' }}
          draft: false
          prerelease: false
