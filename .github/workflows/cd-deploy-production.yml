name: CD - Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.2.3)'
        required: true
        type: string
      skip_tests:
        description: 'Skip validation tests'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: write

env:
  DEPLOYMENT_ENVIRONMENT: production
  DEPLOYMENT_TARGET: hart-server

jobs:
  approval:
    name: Manual Approval Required
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.hartonomous.com
    steps:
      - name: Approval checkpoint
        run: |
          echo "✅ Production deployment approved"
          echo "Version: ${{ inputs.version }}"

  preflight:
    name: Preflight Checks
    needs: approval
    runs-on: [self-hosted, linux, hart-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Run preflight checks
        run: |
          chmod +x ./deployment/scripts/preflight/check-prerequisites.sh
          ./deployment/scripts/preflight/check-prerequisites.sh

      - name: Validate secrets
        env:
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/preflight/validate-secrets.sh
          ./deployment/scripts/preflight/validate-secrets.sh

  backup:
    name: Backup Current Production
    needs: preflight
    runs-on: [self-hosted, linux, hart-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Backup database
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
        run: |
          chmod +x ./deployment/scripts/database/backup-database.sh
          ./deployment/scripts/database/backup-database.sh

      - name: Backup application
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
        run: |
          chmod +x ./deployment/scripts/application/backup-application.sh
          ./deployment/scripts/application/backup-application.sh

  deploy-database:
    name: Deploy Database
    needs: backup
    runs-on: [self-hosted, linux, hart-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Deploy schema
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
        run: |
          chmod +x ./deployment/scripts/database/deploy-schema.sh
          ./deployment/scripts/database/deploy-schema.sh

  deploy-application:
    name: Deploy Application
    needs: deploy-database
    runs-on: [self-hosted, linux, hart-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Deploy API
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/application/deploy-api.sh
          ./deployment/scripts/application/deploy-api.sh

      - name: Deploy Neo4j Worker
        env:
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/neo4j/deploy-neo4j-worker.sh
          ./deployment/scripts/neo4j/deploy-neo4j-worker.sh

  validate:
    name: Validate Deployment
    needs: deploy-application
    runs-on: [self-hosted, linux, hart-server]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Health check
        run: |
          chmod +x ./deployment/scripts/validation/health-check.sh
          ./deployment/scripts/validation/health-check.sh

      - name: Smoke tests
        if: ${{ !inputs.skip_tests }}
        run: |
          chmod +x ./deployment/scripts/validation/smoke-test.sh
          ./deployment/scripts/validation/smoke-test.sh

      - name: Notify deployment success
        uses: actions/github-script@v7
        if: success()
        with:
          script: |
            const message = `🚀 Production deployment successful!

            - Version: ${{ inputs.version }}
            - Environment: Production
            - Target: hart-server
            - Deployed by: @${{ github.actor }}`;

            console.log(message);

  create-release:
    name: Create GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          body: |
            ## 🚀 Production Release ${{ inputs.version }}

            **Deployed to**: hart-server (Production)
            **Deployed by**: @${{ github.actor }}
            **Deployed at**: ${{ github.event.repository.updated_at }}

            ### Deployment Summary
            - ✅ Database migration successful
            - ✅ Application deployment successful
            - ✅ Neo4j worker deployment successful
            - ✅ Health checks passing
            - ✅ Smoke tests passing
          draft: false
          prerelease: false
