name: CD - Deploy to Development

on:
  push:
    branches: [develop]
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  DEPLOYMENT_ENVIRONMENT: development
  DEPLOYMENT_TARGET: HART-DESKTOP

jobs:
  preflight:
    name: Preflight Checks
    runs-on: [self-hosted, windows, HART-DESKTOP]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run preflight checks
        env:
          LOG_LEVEL: INFO
        run: |
          chmod +x ./deployment/scripts/preflight/check-prerequisites.sh
          ./deployment/scripts/preflight/check-prerequisites.sh

      - name: Validate secrets
        env:
          LOG_LEVEL: INFO
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/preflight/validate-secrets.sh
          ./deployment/scripts/preflight/validate-secrets.sh

  deploy-database:
    name: Deploy Database
    needs: preflight
    runs-on: [self-hosted, windows, HART-DESKTOP]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy schema
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
        run: |
          chmod +x ./deployment/scripts/database/deploy-schema.sh
          ./deployment/scripts/database/deploy-schema.sh

  deploy-application:
    name: Deploy Application
    needs: deploy-database
    runs-on: [self-hosted, windows, HART-DESKTOP]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy API
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/application/deploy-api.sh
          ./deployment/scripts/application/deploy-api.sh

      - name: Deploy Neo4j Worker
        env:
          LOG_LEVEL: INFO
          DEPLOYMENT_ENVIRONMENT: ${{ env.DEPLOYMENT_ENVIRONMENT }}
          KEY_VAULT_URL: ${{ secrets.KEY_VAULT_URL }}
        run: |
          chmod +x ./deployment/scripts/neo4j/deploy-neo4j-worker.sh
          ./deployment/scripts/neo4j/deploy-neo4j-worker.sh

  validate:
    name: Validate Deployment
    needs: deploy-application
    runs-on: [self-hosted, windows, HART-DESKTOP]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Health check
        run: |
          chmod +x ./deployment/scripts/validation/health-check.sh
          ./deployment/scripts/validation/health-check.sh

      - name: Smoke tests
        run: |
          chmod +x ./deployment/scripts/validation/smoke-test.sh
          ./deployment/scripts/validation/smoke-test.sh

      - name: Create deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to **Development** environment" >> $GITHUB_STEP_SUMMARY
          echo "- Target: HART-DESKTOP" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
